<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮箱变更确认 - {app_name}</title>
</head>
<body style="margin:0; padding:0; font-family: Arial, Helvetica, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td align="center" style="padding:30px 10px;">

                <!-- 主容器 -->
                <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; background:#2c1e5e; border-radius:20px; overflow:hidden;">

                    <!-- 头部 -->
                    <tr>
                        <td bgcolor="#4a3a8f" align="center" style="padding:45px 30px 35px; background: linear-gradient(135deg, #f39c12, #e67e22);">
                            <h1 style="color:#ffffff; font-size:28px; font-weight:bold; margin:0; letter-spacing:2px;">{app_name}</h1>
                        </td>
                    </tr>

                    <!-- 内容区 -->
                    <tr>
                        <td style="padding:45px 35px; text-align:center; background:#2c1e5e;">
                            <img src="cid:logo" width="80px" style="margin:0 0 8px 0;">

                            <p style="color:#d0c4ff; font-size:16px; line-height:1.6; margin:0 0 30px 0;">
                                您好，<strong style="color:#ffffff;">{user_name}</strong><br>
                                您的账户正在申请更换绑定邮箱：
                            </p>

                            <!-- 邮箱变更信息卡片 -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#3a2a7a; border:2px solid #f39c12; border-radius:16px; margin-bottom:30px;">
                                <tr>
                                    <td style="padding:25px 30px; text-align:left;">
                                        <p style="color:#c8b8ff; font-size:14px; margin:0 0 12px 0;">
                                            📧 <strong style="color:#ffffff;">邮箱变更详情</strong>
                                        </p>
                                        <p style="color:#a89cff; font-size:13px; margin:0 0 5px 0;">• 当前邮箱：<strong style="color:#ffffff;">{old_email}</strong></p>
                                        <p style="color:#a89cff; font-size:13px; margin:0;">• 新邮箱：<strong style="color:#f39c12;">{new_email}</strong></p>
                                    </td>
                                </tr>
                            </table>

                            <!-- 取消按钮 -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:30px;">
                                <tr>
                                    <td align="center">
                                        <a href="{cancel_link}" style="display:inline-block; background:#e67e22; color:#ffffff; font-size:16px; font-weight:bold; text-decoration:none; padding:14px 40px; border-radius:10px; border:2px solid #f39c12;">取消邮箱变更</a>
                                    </td>
                                </tr>
                            </table>

                            <p style="color:#a89cff; font-size:15px; margin:35px 0 0 0; line-height:1.5;">
                                如果这不是您本人的操作，请点击上方按钮取消变更。<br>
                                如未在有效时间内取消，邮箱将被更换。
                            </p>

                        </td>
                    </tr>

                    <!-- 页脚 -->
                    <tr>
                        <td style="padding:30px; text-align:center; background:#25194f; border-top:1px solid #3f2e75;">
                            <p style="color:#9b8fd1; font-size:13px; margin:0 0 5px 0;">
                                © {time} {app_name}
                            </p>
                            <p style="color:#7a6eb8; font-size:12px; margin:0;">
                                此邮件由系统自动发送，请勿回复
                            </p>
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>
</body>
</html>
