<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>限时优惠 - {app_name}</title>
</head>
<body style="margin:0; padding:0; font-family: Arial, Helvetica, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td align="center" style="padding:30px 10px;">

                <!-- 主容器 -->
                <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; background:#2c1e5e; border-radius:20px; overflow:hidden;">

                    <!-- 头部 - 促销主题色 -->
                    <tr>
                        <td bgcolor="#e74c3c" align="center" style="padding:45px 30px 35px; background: linear-gradient(135deg, #e74c3c, #c0392b);">
                            <h1 style="color:#ffffff; font-size:28px; font-weight:bold; margin:0; letter-spacing:2px;">🔥 {event_title}</h1>
                        </td>
                    </tr>

                    <!-- Banner 图片区 -->
                    <tr>
                        <td style="padding:0; text-align:center; background:#2c1e5e;">
                            <img src="{banner_url}" alt="活动 banner" width="600" style="display:block; max-width:100%; height:auto;">
                        </td>
                    </tr>

                    <!-- 内容区 -->
                    <tr>
                        <td style="padding:45px 35px; text-align:center; background:#2c1e5e;">
                            <img src="cid:logo" width="80px" style="margin:0 0 8px 0;">

                            <p style="color:#d0c4ff; font-size:16px; line-height:1.6; margin:0 0 10px 0;">
                                您好，<strong style="color:#ffffff;">{user_name}</strong>
                            </p>
                            <p style="color:#d0c4ff; font-size:16px; line-height:1.6; margin:0 0 30px 0;">
                                {discount_desc}
                            </p>

                            <!-- 优惠码卡片 -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#3a2a7a; border:2px solid #e74c3c; border-radius:16px; margin-bottom:30px;">
                                <tr>
                                    <td style="padding:35px 25px; text-align:center;">
                                        <p style="color:#c8b8ff; font-size:15px; margin:0 0 12px 0;">您的专属优惠码：</p>
                                        <div style="font-size:38px; font-weight:bold; letter-spacing:6px; color:#ffffff; background:#1f1547; padding:16px 35px; border-radius:12px; display:inline-block; border:2px dashed #e74c3c;">
                                            {coupon_code}
                                        </div>
                                        <p style="color:#ffb3b3; font-size:13px; margin:12px 0 0 0;">有效期至：{valid_until}</p>
                                    </td>
                                </tr>
                            </table>

                            <!-- 推荐商品列表 -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#3a2a7a; border:2px solid #7b6cd1; border-radius:16px; margin-bottom:30px;">
                                <tr>
                                    <td style="padding:20px 30px;">
                                        <p style="color:#c8b8ff; font-size:14px; margin:0 0 15px 0;">
                                            🛍️ <strong style="color:#ffffff;">精选推荐</strong>
                                        </p>
                                        {goods_html}
                                    </td>
                                </tr>
                            </table>

                            <p style="color:#a89cff; font-size:13px; margin:35px 0 0 0; line-height:1.5;">
                                如果您不希望再收到此类邮件，可以<a href="{unsubscribe_url}" style="color:#9b8fd1;">点击此处退订</a>。
                            </p>

                        </td>
                    </tr>

                    <!-- 页脚 -->
                    <tr>
                        <td style="padding:30px; text-align:center; background:#25194f; border-top:1px solid #3f2e75;">
                            <p style="color:#9b8fd1; font-size:13px; margin:0 0 5px 0;">
                                © {time} {app_name}
                            </p>
                            <p style="color:#7a6eb8; font-size:12px; margin:0;">
                                此邮件由系统自动发送，请勿回复
                            </p>
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>
</body>
</html>
