<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退款进度通知 - {app_name}</title>
</head>
<body style="margin:0; padding:0; font-family: Arial, Helvetica, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td align="center" style="padding:30px 10px;">

                <!-- 主容器 -->
                <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; background:#2c1e5e; border-radius:20px; overflow:hidden;">

                    <!-- 头部 -->
                    <tr>
                        <td bgcolor="#4a3a8f" align="center" style="padding:45px 30px 35px; background: linear-gradient(135deg, #9b59b6, #8e44ad);">
                            <h1 style="color:#ffffff; font-size:28px; font-weight:bold; margin:0; letter-spacing:2px;">💳 退款进度通知</h1>
                        </td>
                    </tr>

                    <!-- 内容区 -->
                    <tr>
                        <td style="padding:45px 35px; text-align:center; background:#2c1e5e;">
                            <img src="cid:logo" width="80px" style="margin:0 0 8px 0;">

                            <p style="color:#d0c4ff; font-size:16px; line-height:1.6; margin:0 0 10px 0;">
                                您好，<strong style="color:#ffffff;">{user_name}</strong>
                            </p>
                            <p style="color:#d0c4ff; font-size:16px; line-height:1.6; margin:0 0 30px 0;">
                                您的退款申请已有最新进展：
                            </p>

                            <!-- 退款信息卡片 -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#3a2a7a; border:2px solid #9b59b6; border-radius:16px; margin-bottom:30px;">
                                <tr>
                                    <td style="padding:25px 30px; text-align:left;">
                                        <p style="color:#c8b8ff; font-size:14px; margin:0 0 12px 0;">
                                            📋 <strong style="color:#ffffff;">退款详情</strong>
                                        </p>
                                        <p style="color:#a89cff; font-size:13px; margin:0 0 5px 0;">• 订单编号：<strong style="color:#ffffff;">{order_id}</strong></p>
                                        <p style="color:#a89cff; font-size:13px; margin:0 0 5px 0;">• 退款金额：<strong style="color:#9b59b6;">¥{refund_amount}</strong></p>
                                        <p style="color:#a89cff; font-size:13px; margin:0 0 5px 0;">• 当前状态：<strong style="color:#ffffff;">{status}</strong></p>
                                        <p style="color:#a89cff; font-size:13px; margin:0;">• 退款原因：<strong style="color:#ffffff;">{reason}</strong></p>
                                    </td>
                                </tr>
                            </table>

                            <p style="color:#a89cff; font-size:15px; margin:35px 0 0 0; line-height:1.5;">
                                退款将按原支付方式退回，预计 1-7 个工作日到账。<br>
                                如有疑问请联系客服。
                            </p>

                        </td>
                    </tr>

                    <!-- 页脚 -->
                    <tr>
                        <td style="padding:30px; text-align:center; background:#25194f; border-top:1px solid #3f2e75;">
                            <p style="color:#9b8fd1; font-size:13px; margin:0 0 5px 0;">
                                © {time} {app_name}
                            </p>
                            <p style="color:#7a6eb8; font-size:12px; margin:0;">
                                此邮件由系统自动发送，请勿回复
                            </p>
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>
</body>
</html>
