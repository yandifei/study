<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单确认 - {app_name}</title>
</head>
<body style="margin:0; padding:0; font-family: Arial, Helvetica, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td align="center" style="padding:30px 10px;">

                <!-- 主容器 -->
                <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; background:#2c1e5e; border-radius:20px; overflow:hidden;">

                    <!-- 头部 -->
                    <tr>
                        <td bgcolor="#4a3a8f" align="center" style="padding:45px 30px 35px; background: linear-gradient(135deg, #2ecc71, #27ae60);">
                            <h1 style="color:#ffffff; font-size:28px; font-weight:bold; margin:0; letter-spacing:2px;">🎉 订单确认</h1>
                        </td>
                    </tr>

                    <!-- 内容区 -->
                    <tr>
                        <td style="padding:45px 35px; text-align:center; background:#2c1e5e;">
                            <img src="cid:logo" width="80px" style="margin:0 0 8px 0;">

                            <p style="color:#d0c4ff; font-size:16px; line-height:1.6; margin:0 0 10px 0;">
                                您好，<strong style="color:#ffffff;">{user_name}</strong>
                            </p>
                            <p style="color:#d0c4ff; font-size:16px; line-height:1.6; margin:0 0 30px 0;">
                                您的订单已支付成功，感谢您的购买！
                            </p>

                            <!-- 订单详情卡片 -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#3a2a7a; border:2px solid #2ecc71; border-radius:16px; margin-bottom:30px;">
                                <tr>
                                    <td style="padding:25px 30px; text-align:left;">
                                        <p style="color:#c8b8ff; font-size:14px; margin:0 0 12px 0;">
                                            📦 <strong style="color:#ffffff;">订单详情</strong>
                                        </p>
                                        <p style="color:#a89cff; font-size:13px; margin:0 0 5px 0;">• 订单编号：<strong style="color:#ffffff;">{order_id}</strong></p>
                                        <p style="color:#a89cff; font-size:13px; margin:0 0 5px 0;">• 下单时间：<strong style="color:#ffffff;">{order_time}</strong></p>
                                        <p style="color:#a89cff; font-size:13px; margin:0 0 5px 0;">• 支付方式：<strong style="color:#ffffff;">{pay_method}</strong></p>
                                    </td>
                                </tr>
                            </table>

                            <!-- 商品列表 -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#3a2a7a; border:2px solid #7b6cd1; border-radius:16px; margin-bottom:30px;">
                                <tr>
                                    <td style="padding:20px 30px;">
                                        <p style="color:#c8b8ff; font-size:14px; margin:0 0 15px 0;">
                                            🛒 <strong style="color:#ffffff;">商品明细</strong>
                                        </p>
                                        {items_html}
                                    </td>
                                </tr>
                            </table>

                            <!-- 合计金额 -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:30px;">
                                <tr>
                                    <td align="center">
                                        <div style="display:inline-block; background:#1f1547; border:2px solid #2ecc71; border-radius:12px; padding:16px 40px;">
                                            <span style="color:#c8b8ff; font-size:16px;">合计金额：</span>
                                            <span style="color:#2ecc71; font-size:24px; font-weight:bold;">¥{total}</span>
                                        </div>
                                    </td>
                                </tr>
                            </table>

                            <!-- 查看订单按钮 -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:30px;">
                                <tr>
                                    <td align="center">
                                        <a href="{order_url}" style="display:inline-block; background:#27ae60; color:#ffffff; font-size:16px; font-weight:bold; text-decoration:none; padding:14px 40px; border-radius:10px; border:2px solid #2ecc71;">查看订单详情</a>
                                    </td>
                                </tr>
                            </table>

                        </td>
                    </tr>

                    <!-- 页脚 -->
                    <tr>
                        <td style="padding:30px; text-align:center; background:#25194f; border-top:1px solid #3f2e75;">
                            <p style="color:#9b8fd1; font-size:13px; margin:0 0 5px 0;">
                                © {time} {app_name}
                            </p>
                            <p style="color:#7a6eb8; font-size:12px; margin:0;">
                                此邮件由系统自动发送，请勿回复
                            </p>
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>
</body>
</html>
