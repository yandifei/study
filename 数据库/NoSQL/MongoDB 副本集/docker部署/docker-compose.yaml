# =============================================================================
# MongoDB 7.0 三节点副本集 Docker Compose 配置（带认证）
# 适用环境：本地开发 / Windows 11 / Linux
# 镜像：mongo:7.0（官方镜像，非 atlas-local）
# 副本集名称：rs0
# 认证：已启用，使用 KeyFile 进行副本集内部认证
# =============================================================================

# -------------------------------------------------------------------
# 关于卷挂载的说明（为什么只挂载这两个目录）
# -------------------------------------------------------------------
# 必须挂载：
#   ./rs*/db:/data/db          -> MongoDB 所有数据（文档、oplog、副本集配置）
#   ./keyfile/rs0.key:ro       -> 副本集内部认证密钥文件（只读）
#
# 不需要（已经移除）：
#   ./rs*/init                 -> 初始化脚本目录，我们手动用 rs.initiate()
#   ./rs*/configdb             -> 分片集群配置服务器专用，副本集用不到
#   ./rs*/mongot               -> mongodb-atlas-local 镜像专用，官方镜像无此路径
# -------------------------------------------------------------------

services:
  # ==================== 节点 0（通常希望成为 PRIMARY） ====================
  mongodb:
    container_name: mongodb          # 容器名称（方便 docker exec 进入）
    image: mongo:7.0                 # 官方 MongoDB 7.0 镜像（LTS 长期支持版）
    hostname: mongodb                # 容器内部主机名，副本集成员之间通信用这个名字
    restart: unless-stopped          # 除非手动停止，否则总是自动重启
    environment:
      # 创建 root 用户（注意变量前缀是 MONGO，不是 MONGODB）
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
    ports:
      - "27017:27017"                # 宿主机端口:容器端口（27017 是 MongoDB 默认端口）
    volumes:
      # 将宿主机目录 ./rs0/db 挂载到容器内 /data/db，实现数据持久化
      - ./rs0/db:/data/db
      # 以只读方式挂载密钥文件，用于副本集节点间身份验证
      - ./keyfile/rs0.key:/opt/keyfile/rs0.key:ro
    command: >
      mongod
      --replSet "rs0"                          # 副本集名称，所有成员必须一致
      --bind_ip localhost,mongodb              # 绑定监听地址：localhost + 容器主机名
      --keyFile /opt/keyfile/rs0.key           # 指定内部认证密钥文件路径
      --auth                                    # 启用客户端访问控制（需要用户名密码）
    networks:
      - mongodb_network                         # 加入自定义网络

  # ==================== 节点 1（SECONDARY） ====================
  mongodb1:
    container_name: mongodb1
    image: mongo:7.0
    hostname: mongodb1                 # 主机名必须与 --bind_ip 中的名字一致
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
    ports:
      - "27018:27017"                 # 映射到宿主机 27018，避免端口冲突
    volumes:
      - ./rs1/db:/data/db              # 每个节点必须有独立的数据目录！
      - ./keyfile/rs0.key:/opt/keyfile/rs0.key:ro
    command: >
      mongod
      --replSet "rs0"
      --bind_ip localhost,mongodb1     # 注意这里绑定的是 mongodb1，不是 mongodb
      --keyFile /opt/keyfile/rs0.key
      --auth
    networks:
      - mongodb_network

  # ==================== 节点 2（SECONDARY） ====================
  mongodb2:
    container_name: mongodb2
    image: mongo:7.0
    hostname: mongodb2
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
    ports:
      - "27019:27017"                 # 映射到宿主机 27019
    volumes:
      - ./rs2/db:/data/db
      - ./keyfile/rs0.key:/opt/keyfile/rs0.key:ro
    command: >
      mongod
      --replSet "rs0"
      --bind_ip localhost,mongodb2     # 绑定 mongodb2
      --keyFile /opt/keyfile/rs0.key
      --auth
    networks:
      - mongodb_network

# =============================================================================
# 自定义桥接网络
# 所有容器加入同一网络后，可以通过容器名/hostname 互相通信
# =============================================================================
networks:
  mongodb_network:
    driver: bridge