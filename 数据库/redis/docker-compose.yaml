# docker-compose.yml
services:
  redis:
    image: redis:7.2                    # 使用官方推荐的稳定版镜像
    container_name: redis               # 容器名
    restart: unless-stopped             # 重启策略：除非停止，否则重启
    # 通过 REDIS_ARGS 环境变量设置密码和开启数据持久化
    # 官方推荐使用 AOF（Append Only File）模式来持久化数据
    ports:
      - "6379:6379" # 将宿主机的6379端口映射到容器的6379端口
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      # 官方文档推荐的做法是挂载一个自定义的配置文件
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      # 挂载一个 Docker 数据卷到容器内的 /data 目录，用于持久化存储数据
      - ./redis_data:/data
    networks:
      - redis_network   # 加上这一行，将容器加入 redis_network 网络
    logging:
      driver: json-file # 指定 Docker 的日志驱动(防止日志无限增长)
      options:
        max-size: "50m" # 每个日志文件最大 50MB
        max-file: "3"   # 最多保留 3 个文件 


networks:
  redis_network:
    name: redis_network
    driver: bridge