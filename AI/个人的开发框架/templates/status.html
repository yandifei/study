<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>状态监控面板</title>
    <link rel="stylesheet" href="/template/css/status/status.css">
</head>

<body>
    <button class="theme-toggle" aria-label="切换主题">🌙 切换主题</button>

    <div class="content">
        <h1>状态监控面板</h1>
        <p class="status-line">实时查看浏览器实例运行状况</p>

        <div class="card warning-card">
            <h3>使用注意事项</h3>
            <ul>
                <li>开启<strong>实时监控</strong>会持续消耗CPU和GUI线程资源，非必要请关闭</li>
                <li>通过拦截广告、图片、视频等资源可大幅降低网络负载与加载时间</li>
                <li>若多个界面同时显示“无法连接”，大概率是内存溢出，建议重启程序</li>
            </ul>
        </div>

        <div class="card">
            <h2>实时监控</h2>
            <div class="hint">点击卡片可直接打开对应实例的实时画面</div>
            <div class="task-grid" id="monitor-grid"></div>
        </div>

        <div class="card">
            <h2>界面截图</h2>
            <div class="hint">点击查看该实例的最新截图（静态）</div>
            <div class="task-grid" id="screenshots-grid"></div>
        </div>
    </div>

    <script src="/template/js/status/status.js"></script>
    <script src="/template/js/status/link.js"></script>
</body>

</html>
