# AstrBot + Napcat + Shipyard Neo + gsuid_core + natapp 一体化部署
# 部署方式: 全量模式
# 使用预构建镜像，无需本地源码

services:
  # AstrBot: 机器人框架
  # AstrBot + Bay 联合部署
  #
  # 此扩展配置在 Bay 服务旁添加了 AstrBot 服务。
  # AstrBot 通过共享的 bay-data 卷自动发现 Bay 的 API 密钥。
  #
  # 使用方法：
  #   docker-compose up -d
  #
  # 启动后：
  #   1. 打开 AstrBot 控制台：http://localhost:6185
  #   2. 进入 AI 配置 → Computer Use
  #   3. 设置 runtime = sandbox，booter = shipyard_neo
  #   4. 设置 endpoint = http://bay:8114（使用 Docker 内部 DNS）
  #   5. access token 留空（将通过 bay-data 卷自动发现）
  #   6. 保存 — 看到“保存成功~”提示且无任何警告即表示配置正确
  astrbot:
    image: soulter/astrbot:latest       # AstrBot 镜像
    container_name: astrbot             # AstrBot 容器名
    restart: unless-stopped             # 重启策略：除非停止，否则重启
    environment:
      # - TZ=Asia/Shanghai                # 时区设置(自己加的)
      - BAY_DATA_DIR=/bay-data          # 让 AstrBot 自动读取 Bay 的 credentials.json(容器中的/bay-data)
      # 额外添加的，为的是代理
      # - NO_PR0XY=localhost,127.0.0.1
    ports:
      - "6185:6185"    # AstrBot WebUI（必选），默认值6185，可以通过设置ASTRBOT_PORT环境变量来部署
      - "4141:4141"                     # API聚合端口
      - "5000:5000"                     # 表情包管理插件
      # - "7833:7833"                   # 自主学习插件端口
      #- "6195:6195"                    # 可选，其他端口
      #- "6199:6199"                    # QQ WebSocket
    volumes:
      # - /etc/localtime:/etc/localtime:ro  # 时间同步（自己加的）
      - ./astrbot-data:/AstrBot/data    # AstrBot 持久化数据到相对路径下
      # - ${PWD}/astrbot-data:/AstrBot/data    # AstrBot 持久化数据到绝对路径下
      - ./bay-data:/bay-data:ro         # 只读挂载 Bay 数据卷，用于自动发现 API Key
    depends_on:
      bay:
        condition: service_healthy
    networks:
      - astrbot_network
    logging:
      driver: json-file # 指定 Docker 的日志驱动(防止日志无限增长)
      options:
        max-size: "50m" # 每个日志文件最大 50MB
        max-file: "3"   # 最多保留 3 个文件 
  
  napcat1:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat1
    restart: unless-stopped
    environment:
      - NAPCAT_UID=${NAPCAT_UID:-1000}
      - NAPCAT_GID=${NAPCAT_GID:-1000}
      - MODE=astrbot
    ports:
      - "6099:6099"
    volumes:
    # data保持和AstrBot一致
      - ./astrbot-data:/AstrBot/data  # 让 NapCat 也能看到 AstrBot 的数据目录
      - ./napcat1/config:/app/napcat/config
      - ./napcat1/ntqq:/app/.config/QQ
    networks:
      - astrbot_network
    #mac_address: "02:42:ac:11:00:02"  # 可选，取消注释可固定MAC地址
  
  napcat2:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat2
    restart: unless-stopped
    environment:
      - NAPCAT_UID=${NAPCAT_UID:-1000}
      - NAPCAT_GID=${NAPCAT_GID:-1000}
      - MODE=astrbot
    ports:
      - "6100:6099"
    volumes:
      # data保持和AstrBot一致
      - ./napcat2/config:/app/napcat/config
      - ./napcat2/ntqq:/app/.config/QQ
      - ./astrbot-data:/AstrBot/data  # 让 NapCat 也能看到 AstrBot 的数据目录
    networks:
      - astrbot_network
    #mac_address: "02:42:ac:11:00:02"  # 可选，取消注释可固定MAC地址

  # Bay: Shipyard Neo 控制面 API
  # Bay 生产部署 - Docker Compose
  #
  # 自包含部署：Bay API 网关 + 共享 Docker 网络。
  # Bay 通过 Docker 套接字动态创建 Ship/Gull 沙盒容器。
  #
  # 使用方法：
  #   1. 编辑 config.yaml（搜索 CHANGE-ME 修改必须项）
  #   2. docker compose up -d
  #   3. curl http://localhost:8114/health
  #
  # 完整文档请参阅 README.md。
  #
  # API 密钥自动生成：
  #   首次启动时，Bay 自动生成 API 密钥（格式 sk-bay-...）并写入
  #   {BAY_DATA_DIR}/credentials.json。配套服务（例如 AstrBot）可以通过
  #   以只读方式挂载 bay-data 卷来自动发现该密钥。
  #   如需注入指定密钥，请在环境变量部分设置 BAY_API_KEY。
  bay:
    image: ghcr.io/astrbotdevs/shipyard-neo-bay:latest
    container_name: bay
    restart: unless-stopped
    environment:
      - BAY_CONFIG_FILE=/app/config.yaml
      - BAY_DATA_DIR=/app/data
      # 如需固定 API Key，可设置此环境变量（优先级高于 config.yaml）
      # - BAY_API_KEY=sk-你的固定key
    ports:
      - "8114:8114"                     # Bay API 端口（可选，供宿主机外部访问）
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock     # 用于动态创建沙箱容器
      - ./config.yaml:/app/config.yaml:ro             # 挂载配置文件
      - ./bay-data:/app/data                          # SQLite 数据库持久化
      - bay-cargos:/var/lib/bay/cargos              # Cargo 工作区持久化（放到wsl2中）
      # - ./bay-cargos:/workspace                       # Cargo 工作区持久化（之前的）
      # - ${PWD}/bay-data:/app/data                          # SQLite 数据库持久化
      # - ${PWD}/bay-cargos:/var/lib/bay/cargos              # Cargo 工作区持久化
    networks:
      - astrbot_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8114/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file # 指定 Docker 的日志驱动(防止日志无限增长)
      options:
        max-size: "50m" # 每个日志文件最大 50MB
        max-file: "3"   # 最多保留 3 个文件 

  gsuid_core:
    image: docker.cnb.cool/gscore-mirror/gsuid_core:latest
    container_name: gsuid_core
    ports:
      # 服务端口
      - "8765:8765"
    volumes:
      # 数据路径 
      - ./gsuid_core/data:/gsuid_core/data
      # 插件路径
      - ./gsuid_core/plugins:/gsuid_core/gsuid_core/plugins
      # 镜像里面的python虚拟环境，不建议挂到 Windows 下(性能可能变差、文件权限/兼容性问题、依赖丢失风险)
      - venv-data:/venv
    # 容器重启策略：除非停止，否则重启
    restart: unless-stopped
    extra_hosts:
      # 在容器的 /etc/hosts 文件里添加一条记录，让容器内能通过 host.docker.internal 这个特殊域名，直接访问你的 Windows 宿主机 IP
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONUNBUFFERED=1
      # ===========================
      # 基础配置 (Basic Config)
      # ===========================
      # python镜像
      # 官方: https://pypi.org/simple/
      # 阿里: https://mirrors.aliyun.com/pypi/simple/
      # 腾讯云: https://mirrors.cloud.tencent.com/pypi/simple/
      # 火山引擎: https://mirrors.volces.com/pypi/simple/
      # 华为云: https://mirrors.huaweicloud.com/repository/pypi/simple/
      # 清华大学: https://pypi.tuna.tsinghua.edu.cn/simple/
      # 中国科学技术大学: https://pypi.mirrors.ustc.edu.cn/simple/
      - UV_INDEX=https://pypi.org/simple/
      # 使项目不再读取 pyproject.toml 配置，从而使用自定义 python 镜像
      # 开启后会读取 GSCORE_PYTHON_INDEX 作为镜像源
      # 0：关闭 1：开启
      # ⚠️注意：该操作会导致 uv.lock 发生 git diff 改动；
      - UV_NO_CONFIG=0
      # ===========================
      # 网络代理 (Proxy Config)
      # ===========================
      # 如果容器内无法连接 GitHub，请配置代理
      # 宿主机 IP 可使用 host.docker.internal (需确保代理软件开启 LAN 模式)
      # - http_proxy=http://host.docker.internal:7890
      # - https_proxy=http://host.docker.internal:7890
      # 不走代理的地址 (通常保持默认即可)
      - no_proxy="localhost,127.0.0.1,.local,cnb.cool,mirrors.aliyun.com,pypi.tuna.tsinghua.edu.cn,mirrors.volces.com"
    networks:
      - astrbot_network
  
  natapp:
    image: natapp/natapp:latest
    container_name: natapp
    restart: unless-stopped
    network_mode: "host"
    environment:
      - authtoken=42e83df5833b1123
      # 如果需要更详细的日志，可以取消下一行的注释
      # - loglevel=DEBUG
    logging:
      driver: "json-file"
      options:
        max-size: "1M"
        max-file: "2"

# 网络改为astrbot_network，原来的配置文件网络是bay-network
networks:
  astrbot_network:
    name: astrbot_network
    driver: bridge

volumes:
  bay-data:
    name: bay-data
  bay-cargos:
    name: bay-cargos
  # 必须存在，这个是早柚核心的python虚拟环境，得挂载到docker卷中
  venv-data: