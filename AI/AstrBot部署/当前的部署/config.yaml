# Bay Production Config - Docker Compose (container_network mode)
# Bay 生产环境配置 - Docker Compose（容器网络模式）
#
# Bay 运行在 Docker 容器中，并通过共享 Docker 网络连接到 Ship/Gull 容器，
# 通过共享的 Docker 网络使用容器 IP 进行通信（不映射主机端口）。
#
# ┌─────────────────────────────────────────────────────────┐
# │  部署前必须修改的项 (搜索 CHANGE-ME)：                   │
# │    1. security.api_key  — 设置强随机密钥                 │
# └─────────────────────────────────────────────────────────┘
# 你得手动拉取镜像(image_pull_policy开启的话这个不用管)：ghcr.io/astrbotdevs/shipyard-neo-ship:latest
# 应当存在的三兄弟
# shipyard-neo-bay
# shipyard-neo-gull
# shipyard-neo-ship


server:                                  # 服务器配置
  host: "0.0.0.0"                        # 监听地址，0.0.0.0 表示接受所有网络接口的连接
  port: 8114                             # 监听端口号

database:                                # 数据库配置
  # 单机(单实例)部署默认使用 SQLite。
  # 若需高可用 / 多实例部署，请切换为 PostgreSQL：
  # url: "postgresql+asyncpg://user:pass@db-host:5432/bay"
  url: "sqlite+aiosqlite:///./data/bay.db"  # 数据库连接地址，此处使用本地 SQLite 文件
  echo: false                            # 是否打印 SQL 日志，false 为关闭

driver:                                  # 驱动配置（负责创建和管理沙箱容器）
  type: docker                           # 驱动类型，使用 Docker

  # 创建新 sandbox(沙箱) 时是否拉取最新的镜像。
  # 生产环境建议设为 "always"，确保每次都使用最新镜像。
  image_pull_policy:  if_not_present     # 镜像拉取策略：always 表示每次都尝试拉取最新镜或 never表示从不拉取从不拉取，仅使用本地已有镜像

  docker:                                # Docker 具体配置
    socket: "unix:///var/run/docker.sock" # Docker 守护进程的 socket 路径

    # Bay 和 Ship/Gull 都在容器内运行 —— 使用容器网络直接连接
    connect_mode: container_network      # 连接模式：容器网络模式

    # Shared network name (must match docker-compose.yaml network)
    # 共享的 Docker 网络名称（必须与 docker-compose.yaml 中的网络名称一致，默认"bay-network"，但是为了统一我改为了"astrbot_network"）
    network: "astrbot_network"               # 使用的 Docker 网络名

    # 禁用主机端口映射 —— 沙箱容器不需要从 Docker 网络外部访问，
    # 生产环境建议关闭，以减少攻击面。
    publish_ports: false
                 # 是否将容器端口发布到主机，false 为不发布
    host_port: null                      # 主机端口，null 表示不使用

cargo:                                   # 文件暂存区（Cargo）配置
  root_path: "./bay-cargos"              # 数据存储的根目录
  default_size_limit_mb: 1024            # 默认的 cargo 大小限制，单位 MB
  mount_path: "/workspace"               # 挂载到沙箱内部的路径

security:                                # 安全配置
  # api_key 必须修改：请设置一个强随机字符串作为 API 密钥（例如用 `openssl rand -hex 32` 生成）
  api_key: "自己填写"
  allow_anonymous: false                 # 是否允许匿名访问，false 表示必须提供 api_key

# ── Shared Browser Service ───────────────────────────────
# ── 共享浏览器服务 ─────────────────────────────────────
# 一个 Chromium 进程通过 gull-service 为所有 browser-python 沙箱提供服务。
# 设为 false 将回退到每个沙箱独立启动 Gull 容器的模式。
browser_service:                         # 浏览器服务配置
  enabled: true                          # 是否启用共享浏览器服务
  endpoint: "http://gull-service:8115"   # 共享浏览器服务的访问地址

# 为沙箱容器注入代理环境变量。
# 启用后，Bay 会自动向沙箱容器注入 HTTP_PROXY、HTTPS_PROXY 和 NO_PROXY 环境变量。
proxy:                                   # 代理配置
  enabled: false                          # 是否启用代理注入，false 为不启用
  # http_proxy: "http://proxy.example.com:7890"  # HTTP 代理地址
  # https_proxy: "http://proxy.example.com:7890" # HTTPS 代理地址
  http_proxy: "http://127.0.0.1:7890"
  https_proxy: "http://127.0.0.1:7890"
  # Optional extra entries to append to default NO_PROXY list
  # （可选）追加到默认 NO_PROXY 列表中的额外条目
  # no_proxy: "my-internal.service"
  no_proxy: "localhost,127.0.0.1,*.local,astrbot_network,bay,astrbot,napcat1,napcat2"

# 预热池 —— 预先启动的备用沙箱实例，用于减少冷启动延迟。
# 当用户创建沙箱时，Bay 会优先尝试取用一个已就绪的预热实例，从而实现近乎即时的启动，无需等待容器启动过程。
warm_pool:
  # 我要关闭预热池
  enabled: false
  # 预热队列 worker 数量（就是需要用到容器的时候最多并发创建多少个容器使用）
  warmup_queue_workers: 2
  # 预热队列最大长度
  warmup_queue_max_size: 256
  # 队列满时的丢弃策略
  warmup_queue_drop_policy: "drop_newest"
  # 超过这个阈值时便于运维告警
  warmup_queue_drop_alert_threshold: 50
  # 预热池维护扫描周期（秒）
  interval_seconds: 30
  # Bay 启动时是否立即运行预热逻辑
  run_on_startup: true

profiles:                                # 沙箱配置文件列表
  # ── 标准 Python 沙箱 ─────────────────────────────
  - id: python-default                   # 配置的唯一标识
    description: "Standard Python sandbox with filesystem and shell access"  # 描述：标准 Python 沙箱，带文件系统和 Shell 访问
    image: "ghcr.io/astrbotdevs/shipyard-neo-ship:latest" # 使用的容器镜像
    runtime_type: ship                   # 运行时类型，ship 表示 ship 服务
    runtime_port: 8123                   # 运行时服务端口
    resources:                           # 资源限制
      cpus: 1.0                          # CPU 核数
      memory: "2g"                       # 内存大小
    capabilities:                        # 能力列表
      - filesystem  # 文件系统能力（包含上传/下载）
      - shell       # Shell 能力
      - python      # Python 能力
    idle_timeout: 1800                   # 空闲超时时间（秒），1800 秒即 30 分钟
    warm_pool_size: 1                    # 预热池中保持的实例数量
    # Environment variables injected into the runtime container (available in Python and Shell)
    # 注入到运行时容器的环境变量（可在 Python 和 Shell 中获取）
    # Example: env: { TZ: "Asia/Shanghai", LANG: "en_US.UTF-8", CUSTOM_VAR: "value" }
    # 例如：env: { TZ: "Asia/Shanghai", LANG: "en_US.UTF-8", CUSTOM_VAR: "value" }
    env: {}                              # 环境变量键值对，当前为空
    # Optional profile-level proxy override
    # （可选）针对此配置的代理覆盖设置
    # proxy:
    #   enabled: false

  # ── 数据科学沙箱（更多资源） ──────────────────────
  - id: python-data                      # 配置标识
    description: "Data science sandbox with extra CPU and memory"  # 描述：数据科学沙箱，提供额外的 CPU 和内存
    image: "ghcr.io/astrbotdevs/shipyard-neo-ship:latest" # 镜像
    runtime_type: ship                   # 运行时类型
    runtime_port: 8123                   # 运行时端口
    resources:                           # 资源限制
      cpus: 2.0                          # 2 核 CPU
      memory: "4g"                       # 4 GB 内存
    capabilities:                        # 能力列表
      - filesystem  # 文件系统
      - shell       # Shell
      - python      # Python
    idle_timeout: 1800                   # 空闲超时
    warm_pool_size: 1                    # 预热池大小
    env: {}                              # 环境变量

  # ── 浏览器 + Python（共享浏览器池） ───────────────
  - id: browser-python                   # 配置标识
    description: "Browser automation with Python backend (shared Chromium)"  # 描述：带 Python 后端的浏览器自动化（共享 Chromium）
    browser: shared                      # 浏览器模式：shared 表示通过共享浏览器服务路由，而非每个沙箱一个 Gull
    containers:                          # 容器列表（此配置中只包含一个 ship 容器）
      - name: ship                       # 容器名称
        image: "ghcr.io/astrbotdevs/shipyard-neo-ship:latest" # 镜像
        runtime_type: ship               # 运行时类型
        runtime_port: 8123               # 运行时端口
        resources:                       # 资源限制
          cpus: 1.0                      # CPU
          memory: "10g"                   # 内存
        capabilities:                    # 能力列表
          - python
          - shell
          - filesystem
          - browser    # 浏览器能力
        env: {}                          # 环境变量
    idle_timeout: 1800                   # 空闲超时
    warm_pool_size: 1                    # 预热池大小

gc:                                      # 垃圾回收（GC）配置
  # 生产环境建议启用自动垃圾回收
  enabled: true                          # 是否启用 GC
  run_on_startup: true                   # 启动时是否立即执行一次 GC
  interval_seconds: 300                  # 定期执行 GC 的间隔（秒），300 秒即 5 分钟

  # Instance identifier — MUST be unique in multi-instance deployments
  # 实例标识符 —— 在多实例部署中必须唯一
  instance_id: "bay-prod"                # 实例 ID，用于区分不同 Bay 实例

  idle_session:                          # 空闲会话回收
    enabled: true                        # 启用
  expired_sandbox:                       # 过期沙箱回收
    enabled: true                        # 启用
  orphan_cargo:                          # 孤立 cargo 回收
    enabled: true                        # 启用
  orphan_container:                      # 孤立容器回收
    # 在生产环境中启用以清理泄漏的容器。
    # 只要每个 Bay 实例的 instance_id 唯一，此操作就是安全的。
    enabled: true                        # 启用
