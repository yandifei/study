# =============================================================================
# 服务列表 —— 定义所有容器服务的详细配置
# =============================================================================
services:
  # =========================================================================
  # init_permissions - 权限初始化容器
  # 首次启动时修正存储目录的文件权限，确保 API 服务可以正常读写
  # 使用 busybox 轻量镜像，执行完毕后自动退出
  # =========================================================================
  # Init container to fix permissions
  # 初始化容器，修正文件权限
  init_permissions:
    image: busybox:latest  # 使用 busybox 轻量级镜像（仅约 1MB）
    command:
      - sh  # 使用 sh shell 执行
      - -c  # 从字符串读取命令
      - |  # 多行命令脚本
        # 标志文件路径，用于判断权限是否已初始化
        FLAG_FILE="/app/api/storage/.init_permissions"
        # 检查标志文件是否存在
        if [ -f "$${FLAG_FILE}" ]; then
          # 权限已初始化，输出提示并退出
          echo "Permissions already initialized. Exiting."
          exit 0
        fi
        # 首次运行，初始化 /app/api/storage 目录的权限
        echo "Initializing permissions for /app/api/storage"
        # 将目录所有者和组改为 UID 1001:GID 1001（Dify 镜像中运行的用户）
        # 并创建标志文件防止重复初始化
        chown -R 1001:1001 /app/api/storage && touch "$${FLAG_FILE}"
        echo "Permissions initialized. Exiting."
    volumes:
      # 将宿主机存储目录挂载到容器中
      # 宿主机路径 ./volumes/app/storage（相对于 docker-compose.yaml 所在目录）
      # 容器内路径 /app/api/storage
      - ./volumes/app/storage:/app/api/storage
    restart: "no"  # 不自动重启（一次性任务容器）

  # =========================================================================
  # api - Dify API 核心服务
  # 负责处理所有 HTTP API 请求，包括应用管理、工作流执行、知识库操作等
  # 这是 Dify 的核心服务，基于 Flask/Gunicorn 运行
  # =========================================================================
  # API service
  # API 核心服务
  api:
    # 引用共享配置（YAML merge 语法：<< 表示合并映射，* 表示引用锚点）
    <<: *shared-api-worker-config
    image: langgenius/dify-api:1.14.2  # Dify API 镜像及版本
    environment:
      # 运行模式：api（区别于 worker 模式）
      MODE: api
      # Sentry 错误监控 DSN（Data Source Name）
      # ${API_SENTRY_DSN:-} 表示使用环境变量 API_SENTRY_DSN，若未设置则为空
      SENTRY_DSN: ${API_SENTRY_DSN:-}
      # Sentry 追踪采样率（0.0=不采样, 1.0=100%采样）
      SENTRY_TRACES_SAMPLE_RATE: ${API_SENTRY_TRACES_SAMPLE_RATE:-1.0}
      # Sentry 性能分析采样率
      SENTRY_PROFILES_SAMPLE_RATE: ${API_SENTRY_PROFILES_SAMPLE_RATE:-1.0}
      # 插件远程安装主机地址
      PLUGIN_REMOTE_INSTALL_HOST: ${EXPOSE_PLUGIN_DEBUGGING_HOST:-localhost}
      # 插件远程安装端口
      PLUGIN_REMOTE_INSTALL_PORT: ${EXPOSE_PLUGIN_DEBUGGING_PORT:-5003}
      # 插件包最大大小（字节，默认 50MB）
      PLUGIN_MAX_PACKAGE_SIZE: ${PLUGIN_MAX_PACKAGE_SIZE:-52428800}
      # 插件守护进程超时时间（秒，默认 600 秒 = 10 分钟）
      PLUGIN_DAEMON_TIMEOUT: ${PLUGIN_DAEMON_TIMEOUT:-600.0}
      # 用于插件通信的内部 API 密钥
      INNER_API_KEY_FOR_PLUGIN: ${PLUGIN_DIFY_INNER_API_KEY:-QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1}
    depends_on:
      # 依赖权限初始化容器完成
      init_permissions:
        condition: service_completed_successfully  # 等待该服务成功完成（退出码为0）
      # 依赖 PostgreSQL 数据库健康
      db_postgres:
        condition: service_healthy  # 等待健康检查通过
        required: false  # 非必需（如果使用 MySQL 则不需要 PostgreSQL）
      # 依赖 MySQL 数据库健康
      db_mysql:
        condition: service_healthy
        required: false  # 非必需（如果使用 PostgreSQL 则不需要 MySQL）
      # 依赖 OceanBase 向量数据库健康
      oceanbase:
        condition: service_healthy
        required: false  # 非必需（仅在使用 OceanBase 时才需要）
      # 依赖 SeekDB 数据库健康
      seekdb:
        condition: service_healthy
        required: false  # 非必需（仅在使用 SeekDB 时才需要）
      # 依赖 Redis 服务启动
      redis:
        condition: service_started  # 仅要求已启动（不要求健康，Redis 启动很快）
    volumes:
      # Mount the storage directory to the container, for storing user files.
      # 将存储目录挂载到容器中，用于存放用户上传的文件
      - ./volumes/app/storage:/app/api/storage
    healthcheck:
      # 健康检查：通过 curl 访问 /health 端点确认服务正常
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s     # 每 30 秒检查一次
      timeout: 5s       # 单次检查的超时时间
      retries: 3        # 连续失败 3 次判定为不健康
      start_period: 30s  # 容器启动后等待 30 秒再开始检查（给予服务初始化时间）
    networks:
      # 连接 SSRF 代理隔离网络（安全隔离）
      - ssrf_proxy_network
      # 连接默认网络（与其他服务通信）
      - default

  # =========================================================================
  # api_websocket - 工作流协作 WebSocket 服务
  # 支持多人实时协作编辑工作流的 WebSocket 连接服务
  # 仅在 COMPOSE_PROFILES 中包含 'collaboration' 时启动
  # =========================================================================
  # WebSocket service for workflow collaboration.
  # 工作流协作 WebSocket 服务
  api_websocket:
    <<: *shared-api-worker-config  # 引用 API 共享配置
    image: langgenius/dify-api:1.14.2  # 与 API 服务使用相同镜像
    profiles:
      - collaboration  # 仅在启用协作模式时启动此服务
    environment:
      # 运行模式：api（处理 WebSocket 连接）
      MODE: api
      # WebSocket 服务使用单 Worker（由 Nginx 做负载均衡时每个连接绑定一个 Worker）
      SERVER_WORKER_AMOUNT: 1
      # WebSocket Worker 类，使用 geventwebsocket 支持 WebSocket 协议
      SERVER_WORKER_CLASS: ${API_WEBSOCKET_WORKER_CLASS:-geventwebsocket.gunicorn.workers.GeventWebSocketWorker}
      # WebSocket 最大连接数（需大于预期并发用户数）
      SERVER_WORKER_CONNECTIONS: ${API_WEBSOCKET_WORKER_CONNECTIONS:-1000}
      # WebSocket 超时时间（秒），长连接需较大值
      GUNICORN_TIMEOUT: ${API_WEBSOCKET_GUNICORN_TIMEOUT:-360}
    depends_on:
      # 依赖 PostgreSQL 数据库健康
      db_postgres:
        condition: service_healthy
        required: false
      # 依赖 MySQL 数据库健康
      db_mysql:
        condition: service_healthy
        required: false
      # 依赖 Redis 服务启动
      redis:
        condition: service_started
    networks:
      - ssrf_proxy_network
      - default

  # =========================================================================
  # worker - Celery 异步任务 Worker
  # 处理所有后台任务队列：数据集处理、工作流执行、邮件发送、知识库索引等
  # 使用 Celery 作为分布式任务队列，Redis 作为消息代理（Broker）
  # =========================================================================
  # worker service
  # Worker 异步任务处理服务
  # The Celery worker for processing all queues (dataset, workflow, mail, etc.)
  # Celery Worker，处理所有队列（数据集、工作流、邮件等）
  worker:
    <<: *shared-worker-config  # 引用 Worker 共享配置
    image: langgenius/dify-api:1.14.2  # 与 API 服务使用相同镜像
    environment:
      # 运行模式：worker（启动 Celery Worker 而非 Flask HTTP 服务）
      MODE: worker
      # Sentry 错误监控 DSN
      SENTRY_DSN: ${API_SENTRY_DSN:-}
      # Sentry 追踪采样率
      SENTRY_TRACES_SAMPLE_RATE: ${API_SENTRY_TRACES_SAMPLE_RATE:-1.0}
      # Sentry 性能分析采样率
      SENTRY_PROFILES_SAMPLE_RATE: ${API_SENTRY_PROFILES_SAMPLE_RATE:-1.0}
      # 插件包最大大小
      PLUGIN_MAX_PACKAGE_SIZE: ${PLUGIN_MAX_PACKAGE_SIZE:-52428800}
      # 插件内部通信 API 密钥
      INNER_API_KEY_FOR_PLUGIN: ${PLUGIN_DIFY_INNER_API_KEY:-QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1}
    depends_on:
      # 依赖权限初始化容器完成
      init_permissions:
        condition: service_completed_successfully
      # 依赖 PostgreSQL 数据库健康
      db_postgres:
        condition: service_healthy
        required: false
      # 依赖 MySQL 数据库健康
      db_mysql:
        condition: service_healthy
        required: false
      # 依赖 OceanBase 数据库健康
      oceanbase:
        condition: service_healthy
        required: false
      # 依赖 SeekDB 数据库健康
      seekdb:
        condition: service_healthy
        required: false
      # 依赖 Redis 服务启动
      redis:
        condition: service_started
    volumes:
      # Mount the storage directory to the container, for storing user files.
      # 将存储目录挂载到容器中，用于存放用户上传的文件
      - ./volumes/app/storage:/app/api/storage
    healthcheck:
      # 健康检查：通过 Celery inspect ping 命令验证 Worker 是否在线
      test: ["CMD-SHELL", "celery -A celery_healthcheck.celery inspect ping"]
      interval: ${COMPOSE_WORKER_HEALTHCHECK_INTERVAL:-30s}  # 检查间隔
      timeout: ${COMPOSE_WORKER_HEALTHCHECK_TIMEOUT:-30s}   # 检查超时
      retries: 3         # 连续失败 3 次判定为不健康
      start_period: 60s  # 启动后等待 60 秒再检查（Worker 初始化较慢）
      # 是否禁用健康检查（默认 true=禁用，减少资源消耗）
      disable: ${COMPOSE_WORKER_HEALTHCHECK_DISABLED:-true}
    networks:
      - ssrf_proxy_network
      - default

  # =========================================================================
  # worker_beat - Celery Beat 定时任务调度器
  # 负责按照 cron 表达式触发周期性任务，如数据清理、统计汇总等
  # 注意：集群环境中只能运行一个 Beat 实例，否则会导致重复调度
  # =========================================================================
  # worker_beat service
  # Worker Beat 定时任务调度服务
  # Celery beat for scheduling periodic tasks.
  # Celery Beat，用于调度周期性任务
  worker_beat:
    <<: *shared-worker-beat-config  # 引用 Worker Beat 共享配置
    image: langgenius/dify-api:1.14.2
    environment:
      # 运行模式：beat（启动 Celery Beat 调度器）
      MODE: beat
    depends_on:
      # 依赖权限初始化容器完成
      init_permissions:
        condition: service_completed_successfully
      # 依赖 PostgreSQL 数据库健康
      db_postgres:
        condition: service_healthy
        required: false
      # 依赖 MySQL 数据库健康
      db_mysql:
        condition: service_healthy
        required: false
      # 依赖 OceanBase 数据库健康
      oceanbase:
        condition: service_healthy
        required: false
      # 依赖 SeekDB 数据库健康
      seekdb:
        condition: service_healthy
        required: false
      # 依赖 Redis 服务启动
      redis:
        condition: service_started
    healthcheck:
      # 健康检查：与 Worker 相同，通过 Celery ping 验证
      test: ["CMD-SHELL", "celery -A celery_healthcheck.celery inspect ping"]
      interval: ${COMPOSE_WORKER_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${COMPOSE_WORKER_HEALTHCHECK_TIMEOUT:-30s}
      retries: 3
      start_period: 60s
      disable: ${COMPOSE_WORKER_HEALTHCHECK_DISABLED:-true}
    networks:
      - ssrf_proxy_network
      - default

  # =========================================================================
  # web - Dify Web 前端服务
  # 基于 Next.js 构建的 Web 控制台界面，提供可视化的应用管理、工作流编辑等功能
  # =========================================================================
  # Frontend web application.
  # Web 前端应用
  web:
    image: langgenius/dify-web:1.14.2  # Dify Web 前端镜像及版本
    restart: always
    env_file:
      # Web 前端专用环境变量
      - path: ./envs/core-services/web.env
        required: false
      # 安全相关环境变量
      - path: ./envs/security.env
        required: false
      # 用户自定义环境变量（最高优先级）
      - ./.env
    environment:
      # 控制台前端访问后端 API 的 URL（浏览器端使用）
      # 留空则使用相对路径（同域部署无需修改）
      CONSOLE_API_URL: ${CONSOLE_API_URL:-}
      # 服务端内部访问 API 的 URL（Next.js SSR 时使用）
      SERVER_CONSOLE_API_URL: ${SERVER_CONSOLE_API_URL:-http://api:5001}
      # 应用前端访问 API 的 URL
      APP_API_URL: ${APP_API_URL:-}
      # Amplitude 用户行为分析 API Key
      AMPLITUDE_API_KEY: ${AMPLITUDE_API_KEY:-}
      # Cookie 作用域（Next.js 前端）
      NEXT_PUBLIC_COOKIE_DOMAIN: ${NEXT_PUBLIC_COOKIE_DOMAIN:-}
      # WebSocket 连接 URL（浏览器端使用）
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-ws://localhost}
      # Web 前端 Sentry 错误监控 DSN
      SENTRY_DSN: ${WEB_SENTRY_DSN:-}
      # Next.js 遥测数据收集开关（0=禁用, 1=启用）
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED:-0}
      # 是否启用 ViNext 实验性功能
      EXPERIMENTAL_ENABLE_VINEXT: ${EXPERIMENTAL_ENABLE_VINEXT:-false}
      # 文本生成超时时间（毫秒）
      TEXT_GENERATION_TIMEOUT_MS: ${TEXT_GENERATION_TIMEOUT_MS:-60000}
      # 内容安全策略白名单（允许加载资源的额外域名）
      CSP_WHITELIST: ${CSP_WHITELIST:-}
      # 是否允许 iframe 嵌入 Dify 页面
      ALLOW_EMBED: ${ALLOW_EMBED:-false}
      # 是否允许内联样式
      ALLOW_INLINE_STYLES: ${ALLOW_INLINE_STYLES:-false}
      # 是否允许 data: 协议 URL
      ALLOW_UNSAFE_DATA_SCHEME: ${ALLOW_UNSAFE_DATA_SCHEME:-false}
      # 插件市场 API 地址
      MARKETPLACE_API_URL: ${MARKETPLACE_API_URL:-https://marketplace.dify.ai}
      # 插件市场前端访问地址
      MARKETPLACE_URL: ${MARKETPLACE_URL:-https://marketplace.dify.ai}
      # RAG 检索最大 Top K 值（限制知识库检索返回的最大片段数）
      TOP_K_MAX_VALUE: ${TOP_K_MAX_VALUE:-10}
      # 索引最大分段 Token 长度（单段超过此长度会被切分）
      INDEXING_MAX_SEGMENTATION_TOKENS_LENGTH: ${INDEXING_MAX_SEGMENTATION_TOKENS_LENGTH:-4000}
      # 循环节点最大循环次数（防止死循环）
      LOOP_NODE_MAX_COUNT: ${LOOP_NODE_MAX_COUNT:-100}
      # 工作流中工具节点的最大工具数
      MAX_TOOLS_NUM: ${MAX_TOOLS_NUM:-10}
      # 并行执行的最大任务数
      MAX_PARALLEL_LIMIT: ${MAX_PARALLEL_LIMIT:-10}
      # Agent 迭代的最大次数
      MAX_ITERATIONS_NUM: ${MAX_ITERATIONS_NUM:-99}
      # 工作流树的最大深度（限制嵌套层级）
      MAX_TREE_DEPTH: ${MAX_TREE_DEPTH:-50}
      # 是否启用 Jina Reader 网页内容抓取
      ENABLE_WEBSITE_JINAREADER: ${ENABLE_WEBSITE_JINAREADER:-true}
      # 是否启用 Firecrawl 网页内容抓取
      ENABLE_WEBSITE_FIRECRAWL: ${ENABLE_WEBSITE_FIRECRAWL:-true}
      # 是否启用 Watercrawl 网页内容抓取
      ENABLE_WEBSITE_WATERCRAWL: ${ENABLE_WEBSITE_WATERCRAWL:-true}

  # =========================================================================
  # db_postgres - PostgreSQL 关系型数据库
  # 存储用户数据、应用配置、对话记录等核心业务数据
  # 使用 PostgreSQL 15 Alpine 轻量版镜像
  # =========================================================================
  # The PostgreSQL database.
  # PostgreSQL 关系型数据库
  db_postgres:
    image: postgres:15-alpine  # PostgreSQL 15 Alpine 轻量版（镜像较小）
    profiles:
      - postgresql  # 仅在 COMPOSE_PROFILES 包含 postgresql 时启动
    restart: always
    environment:
      # PostgreSQL 超级用户名
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      # PostgreSQL 超级用户密码
      POSTGRES_PASSWORD: ${DB_PASSWORD:-difyai123456}
      # 默认创建的数据库名
      POSTGRES_DB: ${DB_DATABASE:-dify}
      # PostgreSQL 数据目录
      PGDATA: ${PGDATA:-/var/lib/postgresql/data/pgdata}
    command: >
      # 通过命令行参数覆盖 PostgreSQL 配置
      # -c 参数直接设置 postgresql.conf 中的配置项
      postgres -c 'max_connections=${POSTGRES_MAX_CONNECTIONS:-100}'
               -c 'shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}'
               -c 'work_mem=${POSTGRES_WORK_MEM:-4MB}'
               -c 'maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}'
               -c 'effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-4096MB}'
               -c 'statement_timeout=${POSTGRES_STATEMENT_TIMEOUT:-0}'
               -c 'idle_in_transaction_session_timeout=${POSTGRES_IDLE_IN_TRANSACTION_SESSION_TIMEOUT:-0}'
    volumes:
      # 持久化数据库数据到宿主机目录
      - ./volumes/db/data:/var/lib/postgresql/data
    healthcheck:
      # 健康检查：使用 pg_isready 工具验证 PostgreSQL 是否可接受连接
      test:
        [
          "CMD",
          "pg_isready",  # PostgreSQL 内置的连接就绪检查工具
          "-h",
          "db_postgres",  # 连接主机
          "-U",
          "${DB_USERNAME:-postgres}",  # 连接用户
          "-d",
          "${DB_DATABASE:-dify}",  # 连接数据库
        ]
      interval: 1s   # 每秒检查一次（启动阶段快速检测）
      timeout: 3s    # 单次检查超时
      retries: 60    # 最多重试 60 次（允许数据库有 60 秒的启动时间）

  # =========================================================================
  # db_mysql - MySQL 关系型数据库（备选）
  # 可选的关系型数据库，作为 PostgreSQL 的替代方案
  # 仅在 COMPOSE_PROFILES 包含 mysql 时启动
  # =========================================================================
  # The mysql database.
  # MySQL 关系型数据库（备选方案）
  db_mysql:
    image: mysql:8.0  # MySQL 8.0 官方镜像
    profiles:
      - mysql  # 仅在 COMPOSE_PROFILES 包含 mysql 时启动
    restart: always
    environment:
      # MySQL root 用户密码
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-difyai123456}
      # 默认创建的数据库名
      MYSQL_DATABASE: ${DB_DATABASE:-dify}
    command: >
      # 通过命令行参数配置 MySQL InnoDB 引擎
      --max_connections=${MYSQL_MAX_CONNECTIONS:-1000}  # 最大连接数
      --innodb_buffer_pool_size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-512M}  # InnoDB 缓冲池大小（建议设为内存的 50-70%）
      --innodb_log_file_size=${MYSQL_INNODB_LOG_FILE_SIZE:-128M}  # InnoDB 日志文件大小
      --innodb_flush_log_at_trx_commit=${MYSQL_INNODB_FLUSH_LOG_AT_TRX_COMMIT:-2}  # 日志刷新策略（2=每2秒刷一次，性能较好）
    volumes:
      # 持久化 MySQL 数据到宿主机目录
      - ${MYSQL_HOST_VOLUME:-./volumes/mysql/data}:/var/lib/mysql
    healthcheck:
      # 健康检查：使用 mysqladmin ping 验证 MySQL 是否可接受连接
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-u",
          "root",
          "-p${DB_PASSWORD:-difyai123456}",
        ]
      interval: 1s   # 每秒检查一次
      timeout: 3s    # 单次检查超时
      retries: 30    # 最多重试 30 次（允许 30 秒启动时间）

  # =========================================================================
  # redis - Redis 缓存和消息队列
  # 提供会话缓存、消息代理（Celery Broker）、事件总线等功能
  # 使用 Redis 6 Alpine 轻量版镜像
  # =========================================================================
  # The redis cache.
  # Redis 缓存和消息队列服务
  redis:
    image: redis:6-alpine  # Redis 6 Alpine 轻量版
    restart: always
    environment:
      # Redis CLI 认证密码（自动设置 REDISCLI_AUTH 环境变量）
      REDISCLI_AUTH: ${REDIS_PASSWORD:-difyai123456}
    volumes:
      # Mount the redis data directory to the container.
      # 将 Redis 数据目录挂载到宿主机，实现数据持久化
      - ./volumes/redis/data:/data
    # Set the redis password when startup redis server.
    # 启动 Redis 服务器时设置访问密码
    command: redis-server --requirepass ${REDIS_PASSWORD:-difyai123456}
    healthcheck:
      # 健康检查：通过 redis-cli 发送 PING 命令并验证响应为 PONG
      test:
        [
          "CMD-SHELL",
          "redis-cli -a ${REDIS_PASSWORD:-difyai123456} ping | grep -q PONG",
        ]

  # =========================================================================
  # sandbox - Dify 代码执行沙箱
  # 在隔离环境中执行工作流中的代码节点（Python/JavaScript）
  # 防止恶意代码影响主服务，所有网络请求通过 SSRF 代理转发
  # =========================================================================
  # The DifySandbox
  # Dify 代码执行沙箱
  sandbox:
    image: langgenius/dify-sandbox:0.2.15  # 沙箱服务镜像及版本
    restart: always
    env_file:
      # 沙箱服务专用环境变量
      - path: ./envs/core-services/sandbox.env
        required: false
      # 安全相关环境变量
      - path: ./envs/security.env
        required: false
      # 用户自定义环境变量
      - ./.env
    environment:
      # The DifySandbox configurations
      # DifySandbox 沙箱配置
      # Make sure you are changing this key for your deployment with a strong key.
      # 请确保在部署时修改此密钥为强密钥
      # You can generate a strong key using `openssl rand -base64 42`.
      # 可使用 `openssl rand -base64 42` 生成强随机密钥
      API_KEY: ${SANDBOX_API_KEY:-dify-sandbox}
      # Gin 框架运行模式（release=生产模式, debug=调试模式）
      GIN_MODE: ${SANDBOX_GIN_MODE:-release}
      # Worker 超时时间（秒），单个代码执行任务的最大时长
      WORKER_TIMEOUT: ${SANDBOX_WORKER_TIMEOUT:-15}
      # 是否允许沙箱访问外部网络
      ENABLE_NETWORK: ${SANDBOX_ENABLE_NETWORK:-true}
      # HTTP 代理（通过 SSRF 代理转发，实现安全过滤）
      HTTP_PROXY: ${SANDBOX_HTTP_PROXY:-http://ssrf_proxy:3128}
      # HTTPS 代理
      HTTPS_PROXY: ${SANDBOX_HTTPS_PROXY:-http://ssrf_proxy:3128}
      # 沙箱服务端口
      SANDBOX_PORT: ${SANDBOX_PORT:-8194}
      # PyPI 镜像 URL（国内部署可设为清华/阿里镜像加速依赖安装）
      PIP_MIRROR_URL: ${PIP_MIRROR_URL:-}
    volumes:
      # 挂载依赖目录（缓存已安装的 Python 包）
      - ./volumes/sandbox/dependencies:/dependencies
      # 挂载配置目录
      - ./volumes/sandbox/conf:/conf
    healthcheck:
      # 健康检查：通过 curl 访问 /health 端点
      test: ["CMD", "curl", "-f", "http://localhost:8194/health"]
    networks:
      # 仅连接 SSRF 代理网络（安全隔离，无法直接访问外网）
      - ssrf_proxy_network

  # =========================================================================
  # plugin_daemon - 插件守护进程
  # 管理第三方插件的安装、运行和生命周期
  # 插件是 Dify 的扩展机制，允许用户安装自定义的工具、模型提供者等
  # =========================================================================
  # plugin daemon
  # 插件守护进程
  plugin_daemon:
    image: langgenius/dify-plugin-daemon:0.6.1-local  # 插件守护进程镜像及版本
    restart: always
    env_file:
      # 核心服务共享环境变量
      - path: ./envs/core-services/shared.env
        required: false
      # 插件守护进程专用环境变量
      - path: ./envs/core-services/plugin-daemon.env
        required: false
      # 安全相关环境变量
      - path: ./envs/security.env
        required: false
      # PostgreSQL 数据库配置
      - path: ./envs/databases/db-postgres.env
        required: false
      # MySQL 数据库配置
      - path: ./envs/databases/db-mysql.env
        required: false
      # Redis 配置
      - path: ./envs/databases/redis.env
        required: false
      # 用户自定义环境变量
      - ./.env
    networks:
      - ssrf_proxy_network
      - default
    environment:
      # 插件专用数据库名称（独立于主业务数据库）
      DB_DATABASE: ${DB_PLUGIN_DATABASE:-dify_plugin}
      # 数据库 SSL 模式（disable=禁用, require=必须, verify-ca=验证CA, verify-full=严格验证）
      DB_SSL_MODE: ${DB_SSL_MODE:-disable}
      # 插件守护进程监听端口
      SERVER_PORT: ${PLUGIN_DAEMON_PORT:-5002}
      # 插件守护进程认证密钥（用于 API 间通信认证）
      SERVER_KEY: ${PLUGIN_DAEMON_KEY:-lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi}
      # 最大插件包大小（字节，默认 50MB）
      MAX_PLUGIN_PACKAGE_SIZE: ${PLUGIN_MAX_PACKAGE_SIZE:-52428800}
      # Go pprof 性能分析开关
      PPROF_ENABLED: ${PLUGIN_PPROF_ENABLED:-false}
      # Dify 内部 API 地址（插件守护进程调用主服务 API 的地址）
      DIFY_INNER_API_URL: ${PLUGIN_DIFY_INNER_API_URL:-http://api:5001}
      # Dify 内部 API 密钥（认证凭证）
      DIFY_INNER_API_KEY: ${PLUGIN_DIFY_INNER_API_KEY:-QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1}
      # 插件远程安装监听主机
      PLUGIN_REMOTE_INSTALLING_HOST: ${PLUGIN_DEBUGGING_HOST:-0.0.0.0}
      # 插件远程安装监听端口
      PLUGIN_REMOTE_INSTALLING_PORT: ${PLUGIN_DEBUGGING_PORT:-5003}
      # 插件工作目录（插件运行时的当前工作目录）
      PLUGIN_WORKING_PATH: ${PLUGIN_WORKING_PATH:-/app/storage/cwd}
      # 是否强制验证插件签名（安全机制）
      FORCE_VERIFYING_SIGNATURE: ${FORCE_VERIFYING_SIGNATURE:-true}
      # Python 环境初始化超时（秒），首次加载需创建虚拟环境
      PYTHON_ENV_INIT_TIMEOUT: ${PLUGIN_PYTHON_ENV_INIT_TIMEOUT:-120}
      # 插件最大执行超时（秒），单次调用最大允许时长
      PLUGIN_MAX_EXECUTION_TIMEOUT: ${PLUGIN_MAX_EXECUTION_TIMEOUT:-600}
      # STDIO 缓冲区大小（字节）
      PLUGIN_STDIO_BUFFER_SIZE: ${PLUGIN_STDIO_BUFFER_SIZE:-1024}
      # STDIO 最大缓冲区大小（字节）
      PLUGIN_STDIO_MAX_BUFFER_SIZE: ${PLUGIN_STDIO_MAX_BUFFER_SIZE:-5242880}
      # PyPI 镜像 URL（国内部署加速）
      PIP_MIRROR_URL: ${PIP_MIRROR_URL:-}
      # 插件存储类型：local=本地存储, s3=AWS S3, aliyun-oss=阿里云OSS, azure-blob=Azure Blob 等
      PLUGIN_STORAGE_TYPE: ${PLUGIN_STORAGE_TYPE:-local}
      # 本地存储根目录（仅在 PLUGIN_STORAGE_TYPE=local 时生效）
      PLUGIN_STORAGE_LOCAL_ROOT: ${PLUGIN_STORAGE_LOCAL_ROOT:-/app/storage}
      # 已安装插件存放路径
      PLUGIN_INSTALLED_PATH: ${PLUGIN_INSTALLED_PATH:-plugin}
      # 插件包缓存路径
      PLUGIN_PACKAGE_CACHE_PATH: ${PLUGIN_PACKAGE_CACHE_PATH:-plugin_packages}
      # 插件媒体资源缓存路径
      PLUGIN_MEDIA_CACHE_PATH: ${PLUGIN_MEDIA_CACHE_PATH:-assets}
      # 插件 OSS 存储桶名称（使用对象存储时配置）
      PLUGIN_STORAGE_OSS_BUCKET: ${PLUGIN_STORAGE_OSS_BUCKET:-}
      # 是否使用 AWS 托管 IAM 角色（S3 存储）
      S3_USE_AWS_MANAGED_IAM: ${PLUGIN_S3_USE_AWS_MANAGED_IAM:-false}
      # 是否使用标准 AWS S3（设为 true 使用 AWS 官方 S3 服务）
      S3_USE_AWS: ${PLUGIN_S3_USE_AWS:-false}
      # S3 兼容存储端点（如 MinIO、腾讯云 COS 等）
      S3_ENDPOINT: ${PLUGIN_S3_ENDPOINT:-}
      # 是否使用路径风格访问 S3（MinIO 等自建存储通常需要）
      S3_USE_PATH_STYLE: ${PLUGIN_S3_USE_PATH_STYLE:-false}
      # AWS 访问密钥 ID
      AWS_ACCESS_KEY: ${PLUGIN_AWS_ACCESS_KEY:-}
      # AWS 秘密访问密钥
      AWS_SECRET_KEY: ${PLUGIN_AWS_SECRET_KEY:-}
      # AWS 区域
      AWS_REGION: ${PLUGIN_AWS_REGION:-}
      # Azure Blob Storage 连接字符串
      AZURE_BLOB_STORAGE_CONNECTION_STRING: ${PLUGIN_AZURE_BLOB_STORAGE_CONNECTION_STRING:-}
      # Azure Blob Storage 容器名称
      AZURE_BLOB_STORAGE_CONTAINER_NAME: ${PLUGIN_AZURE_BLOB_STORAGE_CONTAINER_NAME:-}
      # 腾讯云 COS 秘密密钥
      TENCENT_COS_SECRET_KEY: ${PLUGIN_TENCENT_COS_SECRET_KEY:-}
      # 腾讯云 COS 秘密 ID
      TENCENT_COS_SECRET_ID: ${PLUGIN_TENCENT_COS_SECRET_ID:-}
      # 腾讯云 COS 区域
      TENCENT_COS_REGION: ${PLUGIN_TENCENT_COS_REGION:-}
      # 阿里云 OSS 区域
      ALIYUN_OSS_REGION: ${PLUGIN_ALIYUN_OSS_REGION:-}
      # 阿里云 OSS 端点
      ALIYUN_OSS_ENDPOINT: ${PLUGIN_ALIYUN_OSS_ENDPOINT:-}
      # 阿里云 OSS 访问密钥 ID
      ALIYUN_OSS_ACCESS_KEY_ID: ${PLUGIN_ALIYUN_OSS_ACCESS_KEY_ID:-}
      # 阿里云 OSS 访问密钥 Secret
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${PLUGIN_ALIYUN_OSS_ACCESS_KEY_SECRET:-}
      # 阿里云 OSS 签名版本（v1 或 v4）
      ALIYUN_OSS_AUTH_VERSION: ${PLUGIN_ALIYUN_OSS_AUTH_VERSION:-v4}
      # 阿里云 OSS 存储路径前缀
      ALIYUN_OSS_PATH: ${PLUGIN_ALIYUN_OSS_PATH:-}
      # 火山引擎 TOS（对象存储）端点
      VOLCENGINE_TOS_ENDPOINT: ${PLUGIN_VOLCENGINE_TOS_ENDPOINT:-}
      # 火山引擎 TOS 访问密钥
      VOLCENGINE_TOS_ACCESS_KEY: ${PLUGIN_VOLCENGINE_TOS_ACCESS_KEY:-}
      # 火山引擎 TOS 秘密密钥
      VOLCENGINE_TOS_SECRET_KEY: ${PLUGIN_VOLCENGINE_TOS_SECRET_KEY:-}
      # 火山引擎 TOS 区域
      VOLCENGINE_TOS_REGION: ${PLUGIN_VOLCENGINE_TOS_REGION:-}
      # 是否启用 Sentry 错误监控
      SENTRY_ENABLED: ${PLUGIN_SENTRY_ENABLED:-false}
      # Sentry DSN
      SENTRY_DSN: ${PLUGIN_SENTRY_DSN:-}
    ports:
      # 暴露插件调试端口到宿主机
      # 格式：宿主机端口:容器端口
      - "${EXPOSE_PLUGIN_DEBUGGING_PORT:-5003}:${PLUGIN_DEBUGGING_PORT:-5003}"
    volumes:
      # 挂载插件守护进程存储目录
      - ./volumes/plugin_daemon:/app/storage
    depends_on:
      # 依赖 PostgreSQL 数据库健康
      db_postgres:
        condition: service_healthy
        required: false
      # 依赖 MySQL 数据库健康
      db_mysql:
        condition: service_healthy
        required: false
      # 依赖 OceanBase 数据库健康
      oceanbase:
        condition: service_healthy
        required: false
      # 依赖 SeekDB 数据库健康
      seekdb:
        condition: service_healthy
        required: false

  # =========================================================================
  # ssrf_proxy - SSRF（服务端请求伪造）防护代理
  # 基于 Squid 代理服务器，用于过滤和控制沙箱对外部网络的访问
  # 防止恶意代码通过沙箱访问内部服务（如云元数据服务、内网数据库等）
  # =========================================================================
  # ssrf_proxy server
  # SSRF 防护代理服务
  # for more information, please refer to
  # 更多信息请参考：
  # https://docs.dify.ai/learn-more/faq/install-faq#18-why-is-ssrf-proxy-needed%3F
  ssrf_proxy:
    image: ubuntu/squid:latest  # 基于 Ubuntu 的 Squid 代理镜像
    restart: always
    volumes:
      # 挂载 Squid 配置模板文件
      - ./ssrf_proxy/squid.conf.template:/etc/squid/squid.conf.template
      # 挂载自定义启动脚本（处理配置模板替换和环境变量注入）
      - ./ssrf_proxy/docker-entrypoint.sh:/docker-entrypoint-mount.sh
    entrypoint:
      # 启动入口：复制启动脚本 → 处理换行符 → 添加执行权限 → 执行
      [
        "sh",
        "-c",
        "cp /docker-entrypoint-mount.sh /docker-entrypoint.sh && sed -i 's/\r$$//' /docker-entrypoint.sh && chmod +x /docker-entrypoint.sh && /docker-entrypoint.sh",
      ]
    environment:
      # pls clearly modify the squid env vars to fit your network environment.
      # 请根据你的网络环境修改 Squid 环境变量
      # Squid HTTP 代理监听端口
      HTTP_PORT: ${SSRF_HTTP_PORT:-3128}
      # Squid 核心转储目录
      COREDUMP_DIR: ${SSRF_COREDUMP_DIR:-/var/spool/squid}
      # 反向代理端口（转发沙箱请求）
      REVERSE_PROXY_PORT: ${SSRF_REVERSE_PROXY_PORT:-8194}
      # 沙箱主机名
      SANDBOX_HOST: ${SSRF_SANDBOX_HOST:-sandbox}
      # 沙箱服务端口
      SANDBOX_PORT: ${SANDBOX_PORT:-8194}
    networks:
      # 连接 SSRF 代理隔离网络
      - ssrf_proxy_network
      # 连接默认网络（需要访问外部网络）
      - default

  # =========================================================================
  # certbot - Let's Encrypt 免费 HTTPS 证书自动续签服务
  # 自动获取和更新 SSL/TLS 证书，配合 Nginx 实现 HTTPS
  # 使用 `docker compose --profile certbot up` 启动此服务
  # =========================================================================
  # Certbot service
  # Certbot HTTPS 证书服务
  # use `docker-compose --profile certbot up` to start the certbot service.
  # 使用 `docker compose --profile certbot up` 启动 certbot 服务
  certbot:
    image: certbot/certbot  # Certbot 官方镜像
    profiles:
      - certbot  # 仅在启用 certbot 配置文件时启动
    volumes:
      # Let's Encrypt 证书和配置目录
      - ./volumes/certbot/conf:/etc/letsencrypt
      # Webroot 验证目录（HTTP-01 挑战）
      - ./volumes/certbot/www:/var/www/html
      # Let's Encrypt 日志目录
      - ./volumes/certbot/logs:/var/log/letsencrypt
      # 活动证书目录（Nginx 直接引用此路径）
      - ./volumes/certbot/conf/live:/etc/letsencrypt/live
      # 证书更新通知模板
      - ./certbot/update-cert.template.txt:/update-cert.template.txt
      # Certbot 启动脚本
      - ./certbot/docker-entrypoint.sh:/docker-entrypoint.sh
    environment:
      # 证书注册邮箱（Let's Encrypt 用于发送过期提醒）
      - CERTBOT_EMAIL=${CERTBOT_EMAIL:-}
      # 证书域名（多个域名用逗号分隔）
      - CERTBOT_DOMAIN=${CERTBOT_DOMAIN:-}
      # Certbot 额外命令行选项
      - CERTBOT_OPTIONS=${CERTBOT_OPTIONS:-}
    entrypoint: ["/docker-entrypoint.sh"]  # 自定义启动入口
    command: ["tail", "-f", "/dev/null"]   # 保持容器运行（证书续签是定时任务）

  # =========================================================================
  # nginx - Nginx 反向代理服务器
  # 作为整个 Dify 系统的流量入口，负责：
  # 1. 反向代理 API 请求到 api 服务
  # 2. 反向代理前端请求到 web 服务
  # 3. 处理 SSL/TLS 终端
  # 4. 负载均衡和请求转发
  # =========================================================================
  # The nginx reverse proxy.
  # Nginx 反向代理服务
  # used for reverse proxying the API service and Web service.
  # 用于反向代理 API 服务和 Web 前端的流量
  nginx:
    image: nginx:latest  # Nginx 官方最新镜像
    restart: always
    volumes:
      # Nginx 主配置模板
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template
      # 代理配置模板（超时、缓冲区等）
      - ./nginx/proxy.conf.template:/etc/nginx/proxy.conf.template
      # HTTPS 配置模板
      - ./nginx/https.conf.template:/etc/nginx/https.conf.template
      # Nginx 额外配置文件目录
      - ./nginx/conf.d:/etc/nginx/conf.d
      # 自定义启动脚本
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint-mount.sh
      # SSL 证书目录（传统方式手动放置证书）
      # cert dir (legacy) - 旧版证书目录
      - ./nginx/ssl:/etc/ssl
      # 通过 Certbot 容器获取的 Let's Encrypt 活动证书
      # cert dir (with certbot container) - Certbot 容器管理的证书目录
      - ./volumes/certbot/conf/live:/etc/letsencrypt/live
      # Let's Encrypt 完整配置
      - ./volumes/certbot/conf:/etc/letsencrypt
      # Webroot 验证目录
      - ./volumes/certbot/www:/var/www/html
    entrypoint:
      # 启动入口：复制脚本 → 处理换行符 → 添加执行权限 → 执行（环境变量替换后启动 Nginx）
      [
        "sh",
        "-c",
        "cp /docker-entrypoint-mount.sh /docker-entrypoint.sh && sed -i 's/\r$$//' /docker-entrypoint.sh && chmod +x /docker-entrypoint.sh && /docker-entrypoint.sh",
      ]
    environment:
      # Nginx 服务器名称（_=匹配所有请求, 具体域名=匹配该域名）
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
      # 是否启用 HTTPS
      NGINX_HTTPS_ENABLED: ${NGINX_HTTPS_ENABLED:-false}
      # HTTPS/SSL 端口
      NGINX_SSL_PORT: ${NGINX_SSL_PORT:-443}
      # HTTP 端口
      NGINX_PORT: ${NGINX_PORT:-80}
      # You're required to add your own SSL certificates/keys to the `./nginx/ssl` directory
      # and modify the env vars below in .env if HTTPS_ENABLED is true.
      # 如果启用 HTTPS，需要将 SSL 证书和密钥放入 `./nginx/ssl` 目录，并修改 .env 中的以下变量
      # SSL 证书文件名
      NGINX_SSL_CERT_FILENAME: ${NGINX_SSL_CERT_FILENAME:-dify.crt}
      # SSL 私钥文件名
      NGINX_SSL_CERT_KEY_FILENAME: ${NGINX_SSL_CERT_KEY_FILENAME:-dify.key}
      # SSL/TLS 协议版本（推荐 TLSv1.2 和 TLSv1.3）
      NGINX_SSL_PROTOCOLS: ${NGINX_SSL_PROTOCOLS:-TLSv1.2 TLSv1.3}
      # Nginx 工作进程数（auto=自动匹配CPU核心数）
      NGINX_WORKER_PROCESSES: ${NGINX_WORKER_PROCESSES:-auto}
      # 客户端请求体最大大小（影响文件上传）
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-100M}
      # Keepalive 超时时间（秒），控制长连接保活时间
      NGINX_KEEPALIVE_TIMEOUT: ${NGINX_KEEPALIVE_TIMEOUT:-65}
      # 代理读取超时（SSE 流式响应等长连接场景需较大值）
      NGINX_PROXY_READ_TIMEOUT: ${NGINX_PROXY_READ_TIMEOUT:-3600s}
      # 代理发送超时
      NGINX_PROXY_SEND_TIMEOUT: ${NGINX_PROXY_SEND_TIMEOUT:-3600s}
      # 是否启用 Certbot ACME 挑战（用于自动获取 HTTPS 证书）
      NGINX_ENABLE_CERTBOT_CHALLENGE: ${NGINX_ENABLE_CERTBOT_CHALLENGE:-false}
      # Socket.IO 上游服务地址（协作模式的 WebSocket 连接转发目标）
      NGINX_SOCKET_IO_UPSTREAM: ${NGINX_SOCKET_IO_UPSTREAM:-api_websocket:5001}
      # Certbot 证书域名（传递给 Nginx 配置模板）
      CERTBOT_DOMAIN: ${CERTBOT_DOMAIN:-}
    depends_on:
      # 依赖 API 和 Web 服务先启动
      - api
      - web
    ports:
      # 暴露 HTTP 端口到宿主机
      # 格式：宿主机端口:容器端口
      - "${EXPOSE_NGINX_PORT:-80}:${NGINX_PORT:-80}"
      # 暴露 HTTPS 端口到宿主机
      - "${EXPOSE_NGINX_SSL_PORT:-443}:${NGINX_SSL_PORT:-443}"

  # =========================================================================
  # weaviate - Weaviate 向量数据库（默认推荐）
  # 用于存储和检索知识库文档的向量嵌入（Embedding）
  # 支持语义搜索、混合搜索（向量+关键词）等功能
  # 仅在 COMPOSE_PROFILES 包含 weaviate 时启动
  # =========================================================================
  # The Weaviate vector store.
  # Weaviate 向量数据库
  weaviate:
    image: semitechnologies/weaviate:1.27.0  # Weaviate 官方镜像及版本
    profiles:
      - weaviate  # 仅在 COMPOSE_PROFILES 包含 weaviate 时启动
    restart: always
    volumes:
      # Mount the Weaviate data directory to the container.
      # 将 Weaviate 数据目录挂载到容器中，实现数据持久化
      - ./volumes/weaviate:/var/lib/weaviate
    environment:
      # The Weaviate configurations
      # Weaviate 配置项
      # You can refer to the [Weaviate](https://weaviate.io/developers/weaviate/config-refs/env-vars) documentation for more information.
      # 更多配置参考 Weaviate 官方文档：https://weaviate.io/developers/weaviate/config-refs/env-vars
      # 数据持久化路径
      PERSISTENCE_DATA_PATH: ${WEAVIATE_PERSISTENCE_DATA_PATH:-/var/lib/weaviate}
      # 默认查询返回数量上限
      QUERY_DEFAULTS_LIMIT: ${WEAVIATE_QUERY_DEFAULTS_LIMIT:-25}
      # 是否允许匿名访问（建议启用 API Key 后关闭匿名访问）
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: ${WEAVIATE_AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED:-false}
      # 默认向量化模块（none=不使用自动向量化，由 Dify 自行处理）
      DEFAULT_VECTORIZER_MODULE: ${WEAVIATE_DEFAULT_VECTORIZER_MODULE:-none}
      # 集群主机名
      CLUSTER_HOSTNAME: ${WEAVIATE_CLUSTER_HOSTNAME:-node1}
      # 是否启用 API Key 认证
      AUTHENTICATION_APIKEY_ENABLED: ${WEAVIATE_AUTHENTICATION_APIKEY_ENABLED:-true}
      # 允许的 API Key 列表（多个用逗号分隔）
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_AUTHENTICATION_APIKEY_ALLOWED_KEYS:-WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih}
      # API Key 关联的用户邮箱列表
      AUTHENTICATION_APIKEY_USERS: ${WEAVIATE_AUTHENTICATION_APIKEY_USERS:-hello@dify.ai}
      # 管理员列表授权是否启用
      AUTHORIZATION_ADMINLIST_ENABLED: ${WEAVIATE_AUTHORIZATION_ADMINLIST_ENABLED:-true}
      # 管理员用户邮箱列表
      AUTHORIZATION_ADMINLIST_USERS: ${WEAVIATE_AUTHORIZATION_ADMINLIST_USERS:-hello@dify.ai}
      # 是否禁用遥测数据上报
      DISABLE_TELEMETRY: ${WEAVIATE_DISABLE_TELEMETRY:-false}
      # 是否启用 GSE 中文分词器（优化中文文本的搜索效果）
      ENABLE_TOKENIZER_GSE: ${WEAVIATE_ENABLE_TOKENIZER_GSE:-false}
      # 是否启用 Kagome 日文分词器
      ENABLE_TOKENIZER_KAGOME_JA: ${WEAVIATE_ENABLE_TOKENIZER_KAGOME_JA:-false}
      # 是否启用 Kagome 韩文分词器
      ENABLE_TOKENIZER_KAGOME_KR: ${WEAVIATE_ENABLE_TOKENIZER_KAGOME_KR:-false}

  # =========================================================================
  # oceanbase - OceanBase 向量数据库
  # 蚂蚁集团开源的企业级分布式数据库，支持向量检索
  # 仅在 COMPOSE_PROFILES 包含 oceanbase 时启动
  # =========================================================================
  # OceanBase vector database
  # OceanBase 分布式向量数据库
  oceanbase:
    image: oceanbase/oceanbase-ce:4.3.5-lts  # OceanBase 社区版镜像
    container_name: oceanbase  # 固定容器名称（便于网络访问）
    profiles:
      - oceanbase  # 仅在使用 OceanBase 时启动
    restart: always
    volumes:
      # OceanBase 数据目录
      - ./volumes/oceanbase/data:/root/ob
      # OceanBase 部署配置目录
      - ./volumes/oceanbase/conf:/root/.obd/cluster
      # 初始化脚本目录
      - ./volumes/oceanbase/init.d:/root/boot/init.d
    environment:
      # OceanBase 内存限制（默认 6GB）
      OB_MEMORY_LIMIT: ${OCEANBASE_MEMORY_LIMIT:-6G}
      # OceanBase 系统管理员密码
      OB_SYS_PASSWORD: ${OCEANBASE_VECTOR_PASSWORD:-difyai123456}
      # OceanBase 租户密码
      OB_TENANT_PASSWORD: ${OCEANBASE_VECTOR_PASSWORD:-difyai123456}
      # 集群名称
      OB_CLUSTER_NAME: ${OCEANBASE_CLUSTER_NAME:-difyai}
      # 服务绑定 IP
      OB_SERVER_IP: 127.0.0.1
      # 运行模式：mini（最小化模式，适合开发测试）
      MODE: mini
      # 语言环境设置
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      # 暴露 OceanBase 端口到宿主机
      # 格式：宿主机端口:容器端口
      - "${OCEANBASE_VECTOR_PORT:-2881}:2881"
    healthcheck:
      # 健康检查：使用 obclient 连接并执行 SELECT 1 验证数据库可用
      test:
        [
          "CMD-SHELL",
          'obclient -h127.0.0.1 -P2881 -uroot@test -p${OCEANBASE_VECTOR_PASSWORD:-difyai123456} -e "SELECT 1;"',
        ]
      interval: 10s     # 每 10 秒检查一次
      retries: 30       # 最多重试 30 次（OceanBase 启动较慢）
      start_period: 30s  # 启动后等待 30 秒再检查
      timeout: 10s      # 单次检查超时

  # =========================================================================
  # seekdb - SeekDB 向量数据库
  # 基于 OceanBase 的独立向量数据库，轻量级部署
  # =========================================================================
  # seekdb vector database
  # SeekDB 向量数据库
  seekdb:
    image: oceanbase/seekdb:latest  # SeekDB 镜像
    container_name: seekdb
    profiles:
      - seekdb
    restart: always
    volumes:
      # SeekDB 数据持久化目录
      - ./volumes/seekdb:/var/lib/oceanbase
    environment:
      # root 用户密码
      ROOT_PASSWORD: ${OCEANBASE_VECTOR_PASSWORD:-difyai123456}
      # 内存限制（默认 2GB）
      MEMORY_LIMIT: ${SEEKDB_MEMORY_LIMIT:-2G}
      # 上报标识
      REPORTER: dify-ai-seekdb
    ports:
      # 暴露 SeekDB 端口到宿主机
      - "${OCEANBASE_VECTOR_PORT:-2881}:2881"
    healthcheck:
      # 健康检查：使用 mysql 客户端连接并执行 SELECT 1
      test:
        [
          "CMD-SHELL",
          'mysql -h127.0.0.1 -P2881 -uroot -p${OCEANBASE_VECTOR_PASSWORD:-difyai123456} -e "SELECT 1;"',
        ]
      interval: 5s
      retries: 60
      timeout: 5s

  # =========================================================================
  # qdrant - Qdrant 向量数据库
  # 高性能向量搜索引擎，使用 Rust 编写
  # 使用前需将 VECTOR_STORE 设为 qdrant
  # =========================================================================
  # Qdrant vector store.
  # Qdrant 向量数据库
  # (if used, you need to set VECTOR_STORE to qdrant in the api & worker service.)
  # 如果使用 Qdrant，需在 api 和 worker 服务中将 VECTOR_STORE 设为 qdrant
  qdrant:
    image: langgenius/qdrant:v1.8.3  # Dify 定制的 Qdrant 镜像
    profiles:
      - qdrant
    restart: always
    volumes:
      # Qdrant 数据持久化目录
      - ./volumes/qdrant:/qdrant/storage
    environment:
      # Qdrant API 密钥（用于访问认证）
      QDRANT_API_KEY: ${QDRANT_API_KEY:-difyai123456}

  # =========================================================================
  # couchbase-server - Couchbase 向量数据库
  # 支持全文搜索和向量搜索的企业级数据库
  # =========================================================================
  # The Couchbase vector store.
  # Couchbase 向量数据库
  couchbase-server:
    build: ./couchbase-server  # 从本地 Dockerfile 构建镜像
    profiles:
      - couchbase
    restart: always
    environment:
      # 集群名称
      - CLUSTER_NAME=dify_search
      # 管理员用户名
      - COUCHBASE_ADMINISTRATOR_USERNAME=${COUCHBASE_USER:-Administrator}
      # 管理员密码
      - COUCHBASE_ADMINISTRATOR_PASSWORD=${COUCHBASE_PASSWORD:-password}
      # 存储桶名称
      - COUCHBASE_BUCKET=${COUCHBASE_BUCKET_NAME:-Embeddings}
      # 存储桶内存配额（MB）
      - COUCHBASE_BUCKET_RAMSIZE=512
      # 总内存配额（MB）
      - COUCHBASE_RAM_SIZE=2048
      # 事件处理内存配额（MB）
      - COUCHBASE_EVENTING_RAM_SIZE=512
      # 索引内存配额（MB）
      - COUCHBASE_INDEX_RAM_SIZE=512
      # 全文搜索内存配额（MB）
      - COUCHBASE_FTS_RAM_SIZE=1024
    hostname: couchbase-server
    container_name: couchbase-server
    working_dir: /opt/couchbase  # 容器内工作目录
    stdin_open: true  # 保持标准输入打开（交互式服务需要）
    tty: true         # 分配伪终端
    entrypoint: [""]  # 覆盖默认入口点
    command: sh -c "/opt/couchbase/init/init-cbserver.sh"  # 启动初始化脚本
    volumes:
      # Couchbase 数据持久化目录
      - ./volumes/couchbase/data:/opt/couchbase/var/lib/couchbase/data
    healthcheck:
      # ensure bucket was created before proceeding
      # 健康检查：确保存储桶已创建
      # 通过 curl 访问 Couchbase REST API 验证存储桶存在
      test:
        [
          "CMD-SHELL",
          "curl -s -f -u Administrator:password http://localhost:8091/pools/default/buckets | grep -q '\\[{' || exit 1",
        ]
      interval: 10s
      retries: 10
      start_period: 30s
      timeout: 10s

  # =========================================================================
  # pgvector - PGVector 向量数据库
  # 基于 PostgreSQL 的扩展，在关系型数据库中实现向量检索
  # 适用于中等规模的向量检索场景
  # =========================================================================
  # The pgvector vector database.
  # PGVector 向量数据库
  pgvector:
    image: pgvector/pgvector:pg16  # PGVector 官方镜像（基于 PostgreSQL 16）
    profiles:
      - pgvector
    restart: always
    environment:
      # PostgreSQL 用户
      PGUSER: ${PGVECTOR_PGUSER:-postgres}
      # The password for the default postgres user.
      # 默认 postgres 用户的密码
      POSTGRES_PASSWORD: ${PGVECTOR_POSTGRES_PASSWORD:-difyai123456}
      # The name of the default postgres database.
      # 默认创建的数据库名
      POSTGRES_DB: ${PGVECTOR_POSTGRES_DB:-dify}
      # postgres data directory
      # PostgreSQL 数据目录
      PGDATA: ${PGVECTOR_PGDATA:-/var/lib/postgresql/data/pgdata}
      # pg_bigm module for full text search
      # pg_bigm 全文搜索模块（日语文本搜索优化）
      PG_BIGM: ${PGVECTOR_PG_BIGM:-false}
      # pg_bigm 模块版本
      PG_BIGM_VERSION: ${PGVECTOR_PG_BIGM_VERSION:-1.2-20240606}
    volumes:
      # PostgreSQL 数据持久化目录
      - ./volumes/pgvector/data:/var/lib/postgresql/data
      # 自定义启动脚本
      - ./pgvector/docker-entrypoint.sh:/docker-entrypoint.sh
    entrypoint: ["/docker-entrypoint.sh"]  # 使用自定义入口点
    healthcheck:
      # 健康检查：pg_isready 验证 PostgreSQL 连接就绪
      test: ["CMD", "pg_isready"]
      interval: 1s
      timeout: 3s
      retries: 30

  # =========================================================================
  # vastbase - Vastbase 向量数据库
  # 海量数据出品的商业向量数据库（获取镜像：https://www.vastdata.com.cn/）
  # =========================================================================
  # get image from https://www.vastdata.com.cn/
  # 从海量数据官网获取镜像：https://www.vastdata.com.cn/
  vastbase:
    image: vastdata/vastbase-vector
    profiles:
      - vastbase
    restart: always
    environment:
      # 数据库兼容模式：PG（兼容 PostgreSQL）
      - VB_DBCOMPATIBILITY=PG
      # 数据库名
      - VB_DB=dify
      # 数据库用户名
      - VB_USERNAME=dify
      # 数据库用户密码
      - VB_PASSWORD=Difyai123456
    ports:
      # 暴露 Vastbase 端口到宿主机（宿主机端口 5434 映射到容器端口 5432）
      - "5434:5432"
    volumes:
      # 许可证目录
      - ./vastbase/lic:/home/vastbase/vastbase/lic
      # 数据目录
      - ./vastbase/data:/home/vastbase/data
      # 备份目录
      - ./vastbase/backup:/home/vastbase/backup
      # 备份日志目录
      - ./vastbase/backup_log:/home/vastbase/backup_log
    healthcheck:
      # 健康检查：pg_isready
      test: ["CMD", "pg_isready"]
      interval: 1s
      timeout: 3s
      retries: 30

  # =========================================================================
  # pgvecto-rs - pgvecto.rs 向量数据库
  # 使用 Rust 实现的高性能 PostgreSQL 向量扩展
  # =========================================================================
  # pgvecto-rs vector store
  # pgvecto.rs 高性能向量存储
  pgvecto-rs:
    image: tensorchord/pgvecto-rs:pg16-v0.3.0  # pgvecto.rs 官方镜像
    profiles:
      - pgvecto-rs
    restart: always
    environment:
      # PostgreSQL 用户
      PGUSER: ${PGVECTOR_PGUSER:-postgres}
      # The password for the default postgres user.
      # 默认 postgres 用户的密码
      POSTGRES_PASSWORD: ${PGVECTOR_POSTGRES_PASSWORD:-difyai123456}
      # The name of the default postgres database.
      # 默认数据库名
      POSTGRES_DB: ${PGVECTOR_POSTGRES_DB:-dify}
      # postgres data directory
      # PostgreSQL 数据目录
      PGDATA: ${PGVECTOR_PGDATA:-/var/lib/postgresql/data/pgdata}
    volumes:
      # PostgreSQL 数据持久化目录
      - ./volumes/pgvecto_rs/data:/var/lib/postgresql/data
    healthcheck:
      # 健康检查：pg_isready
      test: ["CMD", "pg_isready"]
      interval: 1s
      timeout: 3s
      retries: 30

  # =========================================================================
  # chroma - Chroma 向量数据库
  # 轻量级开源向量数据库，适合小型部署和开发环境
  # =========================================================================
  # Chroma vector database
  # Chroma 轻量级向量数据库
  chroma:
    image: ghcr.io/chroma-core/chroma:0.5.20  # Chroma 官方镜像
    profiles:
      - chroma
    restart: always
    volumes:
      # Chroma 数据持久化目录
      - ./volumes/chroma:/chroma/chroma
    environment:
      # 认证凭证
      CHROMA_SERVER_AUTHN_CREDENTIALS: ${CHROMA_SERVER_AUTHN_CREDENTIALS:-difyai123456}
      # 认证提供者（Token 认证）
      CHROMA_SERVER_AUTHN_PROVIDER: ${CHROMA_SERVER_AUTHN_PROVIDER:-chromadb.auth.token_authn.TokenAuthenticationServerProvider}
      # 是否启用持久化
      IS_PERSISTENT: ${CHROMA_IS_PERSISTENT:-TRUE}

  # =========================================================================
  # iris - InterSystems IRIS 向量数据库
  # 企业级数据平台，支持向量检索、SQL、事务处理等多种数据操作
  # =========================================================================
  # InterSystems IRIS vector database
  # InterSystems IRIS 企业级向量数据库
  iris:
    image: containers.intersystems.com/intersystems/iris-community:2025.3  # IRIS 社区版镜像
    profiles:
      - iris
    container_name: iris
    restart: always
    init: true  # 使用 init 进程处理信号转发
    ports:
      # 超级服务端口（数据库连接）
      - "${IRIS_SUPER_SERVER_PORT:-1972}:1972"
      # Web 服务端口（管理界面）
      - "${IRIS_WEB_SERVER_PORT:-52773}:52773"
    volumes:
      # IRIS 持久化数据目录
      - ./volumes/iris:/durable
      # IRIS 初始化脚本
      - ./iris/iris-init.script:/iris-init.script
      # 自定义启动脚本
      - ./iris/docker-entrypoint.sh:/custom-entrypoint.sh
    entrypoint: ["/custom-entrypoint.sh"]  # 自定义入口点
    tty: true  # 分配伪终端
    environment:
      # 时区设置
      TZ: ${IRIS_TIMEZONE:-UTC}
      # IRIS 数据目录
      ISC_DATA_DIRECTORY: /durable/iris

  # =========================================================================
  # oracle - Oracle 向量数据库
  # Oracle Database 23ai Free 版本，内置向量检索功能
  # =========================================================================
  # Oracle vector database
  # Oracle 向量数据库
  oracle:
    image: container-registry.oracle.com/database/free:latest  # Oracle Database Free 镜像
    profiles:
      - oracle
    restart: always
    volumes:
      # Oracle 数据文件存储卷
      - source: oradata  # 引用下方定义的命名卷
        type: volume
        target: /opt/oracle/oradata
      # 启动脚本目录
      - ./startupscripts:/opt/oracle/scripts/startup
    environment:
      # Oracle 系统密码
      ORACLE_PWD: ${ORACLE_PWD:-Dify123456}
      # 数据库字符集
      ORACLE_CHARACTERSET: ${ORACLE_CHARACTERSET:-AL32UTF8}

  # =========================================================================
  # Milvus 向量数据库服务集群
  # Milvus 是云原生向量数据库，需要 etcd（元数据）和 MinIO（对象存储）作为依赖
  # 以下三个服务（etcd、minio、milvus-standalone）配合使用
  # 仅在 COMPOSE_PROFILES 包含 milvus 时启动
  # =========================================================================
  # Milvus vector database services
  # Milvus 向量数据库服务集群

  # etcd - Milvus 依赖的分布式键值存储（存储元数据）
  etcd:
    container_name: milvus-etcd  # 固定容器名（方便 Milvus 连接）
    image: quay.io/coreos/etcd:v3.5.5  # etcd 官方镜像
    profiles:
      - milvus
    environment:
      # 自动压缩模式：revision（按修订版本号压缩历史数据）
      ETCD_AUTO_COMPACTION_MODE: ${ETCD_AUTO_COMPACTION_MODE:-revision}
      # 保留的修订版本数量
      ETCD_AUTO_COMPACTION_RETENTION: ${ETCD_AUTO_COMPACTION_RETENTION:-1000}
      # etcd 后端存储配额（字节，约 4GB）
      ETCD_QUOTA_BACKEND_BYTES: ${ETCD_QUOTA_BACKEND_BYTES:-4294967296}
      # 快照计数（写入多少次后触发快照）
      ETCD_SNAPSHOT_COUNT: ${ETCD_SNAPSHOT_COUNT:-50000}
    volumes:
      # etcd 数据持久化目录
      - ./volumes/milvus/etcd:/etcd
    # 启动命令：声明客户端 URL 和监听地址，指定数据目录
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      # 健康检查：etcdctl endpoint health 验证集群健康
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      # 连接 milvus 专用网络（与外部隔离）
      - milvus

  # minio - Milvus 依赖的对象存储（存储向量和索引数据）
  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z  # MinIO 固定版本镜像
    profiles:
      - milvus
    environment:
      # MinIO 访问密钥（用户名）
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      # MinIO 秘密密钥（密码）
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      # MinIO 数据持久化目录
      - ./volumes/milvus/minio:/minio_data
    # 启动 MinIO 服务，Console 管理界面监听 9001 端口
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      # 健康检查：curl 访问 MinIO 健康检查端点
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - milvus

  # milvus-standalone - Milvus 主服务（独立模式）
  # 包含所有 Milvus 组件：数据节点、索引节点、查询节点、代理等
  milvus-standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.3  # Milvus 官方镜像
    profiles:
      - milvus
    # 启动命令：以独立模式运行所有 Milvus 组件
    command: ["milvus", "run", "standalone"]
    environment:
      # etcd 端点地址（元数据存储）
      ETCD_ENDPOINTS: ${ETCD_ENDPOINTS:-etcd:2379}
      # MinIO 地址（对象存储）
      MINIO_ADDRESS: ${MINIO_ADDRESS:-minio:9000}
      # 是否启用授权认证
      common.security.authorizationEnabled: ${MILVUS_AUTHORIZATION_ENABLED:-true}
    volumes:
      # Milvus 数据持久化目录
      - ./volumes/milvus/milvus:/var/lib/milvus
    healthcheck:
      # 健康检查：curl 访问 Milvus 健康检查端点
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s  # 启动后等待 90 秒再检查（Milvus 启动较慢）
      timeout: 20s
      retries: 3
    depends_on:
      # 依赖 etcd 和 MinIO 先启动
      - etcd
      - minio
    ports:
      # Milvus gRPC 端口（客户端连接）
      - 19530:19530
      # Milvus 健康检查/metrics 端口
      - 9091:9091
    networks:
      - milvus

  # =========================================================================
  # opensearch - OpenSearch 向量数据库
  # AWS 开源的搜索和分析引擎，支持向量检索和全文搜索
  # 包含 OpenSearch 主服务和可视化面板（Dashboards）
  # =========================================================================
  # Opensearch vector database
  # OpenSearch 向量数据库
  opensearch:
    container_name: opensearch
    image: opensearchproject/opensearch:latest  # OpenSearch 官方镜像
    profiles:
      - opensearch
    environment:
      # 发现模式：single-node=单节点模式
      discovery.type: ${OPENSEARCH_DISCOVERY_TYPE:-single-node}
      # 是否锁定内存（防止内存交换，提高性能）
      bootstrap.memory_lock: ${OPENSEARCH_BOOTSTRAP_MEMORY_LOCK:-true}
      # JVM 堆内存设置（-Xms=初始堆大小, -Xmx=最大堆大小）
      OPENSEARCH_JAVA_OPTS: -Xms${OPENSEARCH_JAVA_OPTS_MIN:-512m} -Xmx${OPENSEARCH_JAVA_OPTS_MAX:-1024m}
      # 初始管理员密码
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-Qazwsxedc!@#123}
    ulimits:
      # 系统资源限制配置
      memlock:
        # 内存锁定限制：-1=无限制
        soft: ${OPENSEARCH_MEMLOCK_SOFT:--1}
        hard: ${OPENSEARCH_MEMLOCK_HARD:--1}
      nofile:
        # 文件描述符数量限制
        soft: ${OPENSEARCH_NOFILE_SOFT:-65536}
        hard: ${OPENSEARCH_NOFILE_HARD:-65536}
    volumes:
      # OpenSearch 数据持久化目录
      - ./volumes/opensearch/data:/usr/share/opensearch/data
    networks:
      - opensearch-net  # OpenSearch 专用网络

  # opensearch-dashboards - OpenSearch 可视化面板
  opensearch-dashboards:
    container_name: opensearch-dashboards
    image: opensearchproject/opensearch-dashboards:latest  # 面板镜像
    profiles:
      - opensearch
    environment:
      # OpenSearch 主机地址（面板连接的后端）
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
    volumes:
      # 面板配置文件
      - ./volumes/opensearch/opensearch_dashboards.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
    networks:
      - opensearch-net
    depends_on:
      # 依赖 OpenSearch 服务
      - opensearch

  # =========================================================================
  # opengauss - openGauss 向量数据库
  # 华为开源的企业级关系型数据库，支持向量检索
  # =========================================================================
  # opengauss vector database.
  # openGauss 向量数据库
  opengauss:
    image: opengauss/opengauss:7.0.0-RC1  # openGauss 镜像
    profiles:
      - opengauss
    privileged: true  # 特权模式（openGauss 需要较高系统权限）
    restart: always
    environment:
      # 数据库用户名
      GS_USERNAME: ${OPENGAUSS_USER:-postgres}
      # 数据库用户密码
      GS_PASSWORD: ${OPENGAUSS_PASSWORD:-Dify@123}
      # 数据库端口
      GS_PORT: ${OPENGAUSS_PORT:-6600}
      # 数据库名
      GS_DB: ${OPENGAUSS_DATABASE:-dify}
    volumes:
      # openGauss 数据持久化目录
      - ./volumes/opengauss/data:/var/lib/opengauss/data
    healthcheck:
      # 健康检查：通过 netstat 检查 tcp6 端口是否在监听
      test: ["CMD-SHELL", "netstat -lntp | grep tcp6 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
    ports:
      # 暴露 openGauss 端口到宿主机
      - ${OPENGAUSS_PORT:-6600}:${OPENGAUSS_PORT:-6600}

  # =========================================================================
  # myscale - MyScale 向量数据库
  # 基于 ClickHouse 的向量数据库，适合大规模向量检索和数据分析
  # =========================================================================
  # MyScale vector database
  # MyScale 高性能向量数据库（基于 ClickHouse）
  myscale:
    container_name: myscale
    image: myscale/myscaledb:1.6.4  # MyScale 官方镜像
    profiles:
      - myscale
    restart: always
    tty: true  # 分配伪终端
    volumes:
      # ClickHouse 数据目录
      - ./volumes/myscale/data:/var/lib/clickhouse
      # ClickHouse 日志目录
      - ./volumes/myscale/log:/var/log/clickhouse-server
      # 用户自定义配置
      - ./volumes/myscale/config/users.d/custom_users_config.xml:/etc/clickhouse-server/users.d/custom_users_config.xml
    ports:
      # 暴露 HTTP 接口端口
      - ${MYSCALE_PORT:-8123}:${MYSCALE_PORT:-8123}

  # =========================================================================
  # matrixone - MatrixOne 向量数据库
  # 云原生超融合数据库，支持向量检索、事务处理、流计算
  # =========================================================================
  # Matrixone vector store.
  # MatrixOne 超融合向量数据库
  matrixone:
    hostname: matrixone  # 固定主机名
    image: matrixorigin/matrixone:2.1.1  # MatrixOne 官方镜像
    profiles:
      - matrixone
    restart: always
    volumes:
      # MatrixOne 数据持久化目录
      - ./volumes/matrixone/data:/mo-data
    ports:
      # 暴露 MatrixOne 端口
      - ${MATRIXONE_PORT:-6001}:${MATRIXONE_PORT:-6001}

  # =========================================================================
  # elasticsearch - Elasticsearch 搜索引擎
  # 支持全文搜索和向量检索的企业级搜索引擎
  # 包含 ES 和 Kibana（可视化面板）两个服务
  # =========================================================================
  # https://www.elastic.co/guide/en/elasticsearch/reference/current/settings.html
  # Elasticsearch 设置参考文档
  # https://www.elastic.co/guide/en/elasticsearch/reference/current/docker.html#docker-prod-prerequisites
  # Elasticsearch Docker 部署前提条件
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3  # ES 官方镜像
    container_name: elasticsearch
    profiles:
      - elasticsearch
      - elasticsearch-ja  # 日文优化版（启用日文分词插件）
    restart: always
    volumes:
      # 自定义启动脚本
      - ./elasticsearch/docker-entrypoint.sh:/docker-entrypoint-mount.sh
      # ES 数据持久化卷
      - dify_es01_data:/usr/share/elasticsearch/data  # 引用命名卷
    environment:
      # Elasticsearch 密码
      ELASTIC_PASSWORD: ${ELASTICSEARCH_PASSWORD:-elastic}
      # 向量存储标识
      VECTOR_STORE: ${VECTOR_STORE:-}
      # 集群名称
      cluster.name: dify-es-cluster
      # 节点名称
      node.name: dify-es0
      # 发现模式：single-node=单节点
      discovery.type: single-node
      # X-Pack 许可证类型：basic=基础免费版
      xpack.license.self_generated.type: basic
      # 启用 X-Pack 安全功能
      xpack.security.enabled: "true"
      # 禁用自动注册功能
      xpack.security.enrollment.enabled: "false"
      # 禁用 HTTP SSL（生产环境建议启用）
      xpack.security.http.ssl.enabled: "false"
    ports:
      # 暴露 ES HTTP 端口
      - ${ELASTICSEARCH_PORT:-9200}:9200
    deploy:
      resources:
        limits:
          # 内存限制 2GB
          memory: 2g
    entrypoint: ["sh", "-c", "sh /docker-entrypoint-mount.sh"]  # 执行启动脚本
    healthcheck:
      # 健康检查：curl 访问集群健康状态 API
      test:
        ["CMD", "curl", "-s", "http://localhost:9200/_cluster/health?pretty"]
      interval: 30s
      timeout: 10s
      retries: 50  # ES 启动较慢，允许多次重试

  # =========================================================================
  # kibana - Kibana 可视化面板
  # Elasticsearch 的可视化管理和数据分析界面
  # =========================================================================
  # https://www.elastic.co/guide/en/kibana/current/docker.html
  # Kibana Docker 部署文档
  # https://www.elastic.co/guide/en/kibana/current/settings.html
  # Kibana 设置文档
  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3  # Kibana 官方镜像
    container_name: kibana
    profiles:
      - elasticsearch  # 与 ES 一起启用
    depends_on:
      # 依赖 ES 先启动
      - elasticsearch
    restart: always
    environment:
      # 加密保存对象的密钥（用于加密仪表板等配置）
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: d1a66dfd-c4d3-4a0a-8290-2abcb83ab3aa
      # 不使用代理的主机列表
      NO_PROXY: localhost,127.0.0.1,elasticsearch,kibana
      # 启用安全功能
      XPACK_SECURITY_ENABLED: "true"
      # 禁用自动注册
      XPACK_SECURITY_ENROLLMENT_ENABLED: "false"
      # 禁用 HTTP SSL
      XPACK_SECURITY_HTTP_SSL_ENABLED: "false"
      # 标记为离线环境
      XPACK_FLEET_ISAIRGAPPED: "true"
      # 界面语言：zh-CN=简体中文
      I18N_LOCALE: zh-CN
      # Kibana 服务端口
      SERVER_PORT: "5601"
      # Elasticsearch 连接地址
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      # 暴露 Kibana 端口
      - ${KIBANA_PORT:-5601}:5601
    healthcheck:
      # 健康检查：curl 访问 Kibana 页面
      test: ["CMD-SHELL", "curl -s http://localhost:5601 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =========================================================================
  # unstructured - 非结构化数据处理服务
  # 用于解析和预处理各种文档格式（PDF、Word、PPT等），提取文本内容
  # 使用前需将 ETL_TYPE 设为 Unstructured
  # =========================================================================
  # unstructured .
  # 非结构化数据处理服务
  # (if used, you need to set ETL_TYPE to Unstructured in the api & worker service.)
  # 如果使用此服务，需在 api 和 worker 服务中将 ETL_TYPE 设为 Unstructured
  unstructured:
    image: downloads.unstructured.io/unstructured-io/unstructured-api:latest  # Unstructured API 镜像
    profiles:
      - unstructured
    restart: always
    volumes:
      # 数据处理工作目录
      - ./volumes/unstructured:/app/data

# =============================================================================
# 网络配置 —— 定义容器间的通信网络拓扑
# =============================================================================
networks:
  # create a network between sandbox, api and ssrf_proxy, and can not access outside.
  # 创建沙箱、API 和 SSRF 代理之间的内部隔离网络，无法直接访问外网
  ssrf_proxy_network:
    driver: bridge   # 使用 bridge 驱动（网桥模式）
    internal: true   # 内部网络，容器无法通过此网络访问外部
  # Milvus 专用网络（etcd、MinIO、Milvus 之间的通信）
  milvus:
    driver: bridge
  # OpenSearch 专用网络（OpenSearch 和面板之间的通信）
  opensearch-net:
    driver: bridge
    internal: true   # 内部网络（可选是否暴露外部访问）

# =============================================================================
# 命名卷 —— 定义 Docker 管理的持久化存储卷
# =============================================================================
volumes:
  # Oracle 数据卷
  oradata:
  # Elasticsearch 数据卷
  dify_es01_data:
