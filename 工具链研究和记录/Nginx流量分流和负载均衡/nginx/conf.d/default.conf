# ============================================================
# 路由分流规则
#   /db/*  → 数据库后端服务  (宿主机 21325)
#   /ai/*  → AI 后端服务      (宿主机 21326)
# ============================================================

server {
    listen 8000;
    server_name _;
    client_max_body_size 500M;

    # 通用 proxy 头设置
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    # ---------- 数据库服务 ----------
    location /db/ {
        # 去掉 /db/ 前缀后转发（/db/users → http://host:21325/users）
        proxy_pass http://host.docker.internal:21325/;
    }

    location /db {
        # 无尾部斜杠时做 301 重定向，确保相对路径正确
        return 301 /db/;
    }

    # ---------- AI 服务 ----------
    location /ai/ {
        proxy_pass http://host.docker.internal:21326/;
    }

    location /ai {
        return 301 /ai/;
    }

    # ---------- 默认兜底 ----------
    location / {
        return 200 "Nginx Router is running.\nUse /db/ or /ai/ to access backend services.\n";
        add_header Content-Type text/plain;
    }
}
