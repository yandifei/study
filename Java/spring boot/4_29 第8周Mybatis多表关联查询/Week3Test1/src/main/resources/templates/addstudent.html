<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>添加学生（动态SQL）</title>
</head>
<body>
<h2>添加学生</h2>
<p>姓名和年龄可选填，不填的字段将使用数据库默认值（NULL）</p>
<form id="form1" name="form1" method="post" action="/addstudent">
    <p>姓名：<input type="text" name="sname" id="sname" /></p>
    <p>年龄：<input type="text" name="sage" id="sage" /></p>
    <p><input type="submit" value="提交" /></p>
</form>
</body>
</html>
