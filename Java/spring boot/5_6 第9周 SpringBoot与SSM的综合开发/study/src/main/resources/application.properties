spring.application.name=study

# MySQL数据库连接配置
spring.datasource.url=jdbc:mysql://localhost:3306/mybatis?serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=yandifei
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 配置XML映射文件中指定的实体类别名路径（自己的实体类包）
mybatis.type-aliases-package=com.study.domain

# 配置MyBatis的XML文件配置路径
mybatis.mapper-locations=classpath:mapper/*.xml

# 控制台输出SQL语句
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 开启驼峰命名匹配映射
mybatis.configuration.map-underscore-to-camel-case=true
