#如果端口被占用：
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/smbms?serverTimezone=UTC&useSSL=false&zeroDateTimeBehavior=convertToNull
spring.datasource.username=root
spring.datasource.password=123456
#开启驼峰命名匹配映射
mybatis.configuration.map-underscore-to-camel-case=true
#配置MyBatis的XML文件配置路径
mybatis.mapper-locations=classpath:mapper/*.xml
#配置XML映射文件中指定的实体类别名路径,这里要根据你的项目修改位置。
mybatis.type-aliases-package=com.example.springbootdemo.domain
#自动映射查询(多表关联不用写全字段)
mybatis.configuration.auto-mapping-behavior=full
#使全局的映射器启用或禁用缓存。
mybatis.configuration.cache-enabled=true
#控制台输出SQL语句
spring.thymeleaf.cache=false
# PageHelper 分页插件配置
pagehelper.helperDialect=mysql
pagehelper.reasonable=true
pagehelper.supportMethodsArguments=true
pagehelper.params=count=countSql






