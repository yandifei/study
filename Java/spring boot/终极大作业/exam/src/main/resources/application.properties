spring.application.name=exam

# 服务器端口
server.port=8080

# 数据源配置
spring.datasource.url=jdbc:mysql://localhost:3306/smbms?serverTimezone=UTC&useSSL=false&zeroDateTimeBehavior=convertToNull&characterEncoding=utf8&useUnicode=true
spring.datasource.username=root
spring.datasource.password=yandifei

# MyBatis 配置
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.yandifei.exam.domain
mybatis.configuration.auto-mapping-behavior=full
mybatis.configuration.cache-enabled=true

# Thymeleaf 缓存关闭（开发时）
spring.thymeleaf.cache=false

# PageHelper 分页插件配置
pagehelper.helperDialect=mysql
pagehelper.reasonable=true
pagehelper.supportMethodsArguments=true
pagehelper.params=count=countSql
