<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>订单添加</title>
    <link type="text/css" rel="stylesheet" th:href="@{/css/style.css}"  />
    <link type="text/css" rel="stylesheet" th:href="@{/css/public.css}" />
</head>
<body>
<div th:replace="~{head :: html}"></div>

<div class="right">
    <div class="location">
        <strong>你现在所在的位置是:</strong>
        <span>订单管理页面 >> 订单添加页面</span>
    </div>
    <div class="providerAdd">
        <form id="billForm" name="billForm" method="post" action="/ordersaddsave">
            <div>
                <label for="billCode">订单编码：</label>
                <input type="text" name="billCode" id="billCode" value="">
                <font color="red"></font>
            </div>
            <div>
                <label for="productName">商品名称：</label>
                <input type="text" name="productName" id="productName" value="">
                <font color="red"></font>
            </div>
            <div>
                <label for="productDesc">商品类型：</label>
                <input type="text" name="productDesc" id="productDesc" value="">
                <font color="red"></font>
            </div>
            <div>
                <label for="productUnit">商品单位：</label>
                <input type="text" name="productUnit" id="productUnit" value="">
                <font color="red"></font>
            </div>
            <div>
                <label>供应商：</label>
                <select name="providerId" id="providerId">
                    <option value="0">--请选择--</option>
                    <option th:each="item:${distinctList}"
                            th:text="${item.provider.proContact}"
                            th:value="${item.provider.id}">
                    </option>
                </select>
                <font color="red"></font>
            </div>
            <div>
                <label for="productCount">商品数量：</label>
                <input type="text" name="productCount" id="productCount" value="">
                <font color="red"></font>
            </div>
            <div>
                <label for="totalPrice">总消费额：</label>
                <input name="totalPrice" id="totalPrice" value="">
            </div>
            <div>
                <label>是否支付：</label>
                <select name="isPayment" id="isPayment">
                    <option value="1">未支付</option>
                    <option value="2">已支付</option>
                </select>
            </div>
            <div class="providerAddBtn">
                <input type="button" name="add" id="add" value="保存">
                <input type="button" id="back" name="back" value="返回" style="padding: 1px 10px">
            </div>
        </form>
    </div>
</div>
</section>

<div th:replace="~{foot :: html}"></div>
<script type="text/javascript" th:src="@{/js/jquery-1.8.3.min.js}"></script>
<script type="text/javascript" th:src="@{/js/common.js}"></script>
<script type="text/javascript" th:src="@{/js/billadd.js}"></script>
</body>
</html>
