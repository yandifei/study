<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>订单修改</title>
  <link type="text/css" rel="stylesheet" th:href="@{/css/style.css}"  />
  <link type="text/css" rel="stylesheet" th:href="@{/css/public.css}" />
</head>
<body>

<div th:replace="~{head :: html}"></div>
<div class="right">
  <div class="location">
    <strong>你现在所在的位置是:</strong>
    <span>订单管理页面 >> 订单修改页面</span>
  </div>
  <div class="providerAdd">
    <form id="billForm" name="billForm" method="post" action="/ordersmodifysave">
      <input type="hidden" name="id" th:value="${bill.id}"/>
      <div>
        <label for="billCode">订单号：</label>
        <input type="text" name="billCode" id="billCode" th:value="${bill.billCode}">
        <font color="red"></font>
      </div>
      <div>
        <label for="productName">产品名称：</label>
        <input type="text" name="productName" id="productName" th:value="${bill.productName}">
        <font color="red"></font>
      </div>
      <div>
        <label for="productDesc">产品类型：</label>
        <input type="text" name="productDesc" id="productDesc" th:value="${bill.productDesc}">
      </div>
      <div>
        <label for="productUnit">产品单位：</label>
        <input type="text" name="productUnit" id="productUnit" th:value="${bill.productUnit}">
        <font color="red"></font>
      </div>
      <div>
        <label for="productCount">产品数量：</label>
        <input type="text" name="productCount" id="productCount" th:value="${bill.productCount}">
        <font color="red"></font>
      </div>
      <div>
        <label for="totalPrice">总价：</label>
        <input type="text" name="totalPrice" id="totalPrice" th:value="${bill.totalPrice}">
        <font color="red"></font>
      </div>
      <div>
        <label>是否支付：</label>
        <select name="isPayment" id="isPayment">
          <option value="1" th:selected="${bill.isPayment==1}">未支付</option>
          <option value="2" th:selected="${bill.isPayment==2}">已支付</option>
        </select>
      </div>
      <div>
        <label>供应商：</label>
        <select name="providerId" id="providerId">
          <option th:value="${bill.providerId}" th:text="${bill.provider.proContact}" selected="selected"></option>
          <option th:each="item:${distinctList}"
                  th:text="${item.provider.proContact}"
                  th:value="${item.provider.id}">
          </option>
        </select>
        <font color="red"></font>
      </div>
      <div class="providerAddBtn">
        <input type="submit" name="save" id="save" value="保存" />
        <input type="button" id="back" name="back" value="返回" style="padding: 1px 10px"/>
      </div>
    </form>
  </div>
</div>
</section>

<div th:replace="~{foot :: html}"></div>
<script type="text/javascript" th:src="@{/js/billmodify.js}"></script>
</body>
</html>
